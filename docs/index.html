<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laren — Interactive Transliteration Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 8px 14px;
  gap: 5px;
  min-width: 900px;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  padding: 2px 0;
}

.top-bar h1 {
  font-size: 1.25rem;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.top-bar input {
  flex: 1;
  max-width: 360px;
  font-size: 1.1rem;
  padding: 5px 14px;
  border-radius: 8px;
  border: 2px solid #334155;
  background: #1e293b;
  color: #f1f5f9;
  outline: none;
  transition: border-color 0.3s;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.12em;
}

.top-bar input:focus { border-color: #818cf8; }
.top-bar input::placeholder { color: #475569; letter-spacing: 0.05em; font-size: 0.9rem; }

.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  font-size: 0.7rem;
  color: #64748b;
}

.speed-control label { white-space: nowrap; }

.speed-control input[type="range"] {
  width: 70px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #334155;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.speed-control input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #818cf8;
  cursor: pointer;
}

.speed-control input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #818cf8;
  border: none;
  cursor: pointer;
}

#speed-label {
  min-width: 24px;
  text-align: right;
  color: #94a3b8;
  font-weight: 600;
  font-size: 0.7rem;
}

.top-bar .pipe-summary {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: #64748b;
  flex-shrink: 0;
}

.top-bar .pipe-summary .pv { color: #94a3b8; font-weight: 600; }
.top-bar .pipe-summary .pa { color: #475569; }

.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 2px 0;
  font-size: 0.72rem;
}

.footer a { color: #818cf8; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer code { color: #94a3b8; }

/* ── Dashboard ── */
.dash {
  flex: 1;
  min-height: 0;
  display: flex;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: #475569;
  gap: 8px;
}

.empty-state .icon { font-size: 2.5rem; }
.empty-state .sub { font-size: 0.75rem; color: #334155; }

.dash-grid {
  display: grid;
  flex: 1;
  min-height: 0;
  grid-template-rows: auto 1fr;
  grid-template-columns: 1fr 240px;
  grid-template-areas:
    "mappings mappings"
    "trie     results";
  gap: 5px;
}

/* ── Panels ── */
.panel {
  background: #1e293b;
  border-radius: 8px;
  border: 1px solid #334155;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}

.panel.visible { opacity: 1; }

.panel-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.panel-label .num {
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  color: #0f172a;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  font-weight: 800;
}

/* ── Mappings Panel ── */
.panel-mappings {
  grid-area: mappings;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  flex-wrap: wrap;
}

.mapping-cards {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.m-card {
  background: #0f172a;
  border-radius: 6px;
  padding: 3px 6px;
  text-align: center;
  border: 1px solid #334155;
  min-width: 44px;
  opacity: 0;
  transform: scale(0.85);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.m-card.visible { opacity: 1; transform: scale(1); }

.m-card .lat {
  font-size: 0.85rem;
  font-weight: 700;
  color: #38bdf8;
  font-family: 'Courier New', monospace;
  line-height: 1.1;
}

.m-card .ar-opts {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  margin-top: 1px;
}

.m-card .ar-opt {
  font-size: 0.7rem;
  color: #94a3b8;
  direction: rtl;
}

.m-card .ar-opt.skip {
  color: #22c55e;
  font-size: 0.55rem;
  font-style: italic;
  direction: ltr;
}

.m-card .cnt { font-size: 0.5rem; color: #475569; margin-top: 1px; }

.branch-eq {
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
  color: #64748b;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
}

.branch-eq .bv { color: #38bdf8; }
.branch-eq .bm { color: #818cf8; }
.branch-eq .bt { color: #22c55e; font-weight: 700; font-size: 0.85rem; }
.branch-eq .bi { font-size: 0.6rem; color: #475569; margin-left: 4px; }

/* ── Trie Panel ── */
.panel-trie {
  grid-area: trie;
  display: flex;
  flex-direction: column;
  padding: 6px 8px;
  min-height: 0;
}

.trie-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
  flex-shrink: 0;
}

.trie-controls {
  display: flex;
  gap: 4px;
  align-items: center;
}

.trie-controls > button {
  background: #0f172a;
  border: 1px solid #334155;
  color: #94a3b8;
  border-radius: 4px;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}

.trie-controls > button:hover { border-color: #818cf8; color: #e2e8f0; }

.trie-legend {
  display: flex;
  gap: 8px;
  font-size: 0.6rem;
  color: #64748b;
}

.trie-legend-item { display: flex; align-items: center; gap: 3px; }

.lg-circle {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid;
}

.lg-circle.lg-default { background: #1e293b; border-color: #475569; }
.lg-circle.lg-word { background: #1e293b; border-color: #475569; outline: 1.5px solid #854d0e; outline-offset: 1px; }
.lg-circle.lg-found { background: #052e16; border-color: #22c55e; }
.lg-circle.lg-dead { background: #450a0a; border-color: #ef4444; }

.trie-svg-area {
  flex: 1;
  min-height: 0;
  background: #0f172a;
  border-radius: 6px;
  border: 1px solid #1e293b;
  position: relative;
  overflow: hidden;
}

.trie-svg-area svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Shared trie node styles ── */
.trie-circle { fill: #1e293b; stroke: #475569; stroke-width: 2; transition: fill 0.3s, stroke 0.3s; }
.trie-word-ring { fill: none; stroke: #854d0e; stroke-width: 2; opacity: 0.5; transition: stroke 0.3s, opacity 0.3s; }
.trie-text { fill: #94a3b8; font-size: 14px; font-family: 'Segoe UI', system-ui, sans-serif; transition: fill 0.3s; pointer-events: none; }
.trie-edge { stroke: #334155; stroke-width: 1.5; transition: stroke 0.3s, stroke-width 0.3s; }
.trie-node-g { cursor: pointer; }
.trie-node-g:hover .trie-circle { stroke: #818cf8; stroke-width: 2.5; }

/* Trie animation highlights */
.trie-node-g.visiting .trie-circle { fill: #1e1b4b; stroke: #818cf8; stroke-width: 2.5; }
.trie-node-g.visiting .trie-text { fill: #c7d2fe; }
.trie-node-g.visiting .trie-word-ring { stroke: #818cf8; opacity: 0.8; }
.trie-node-g.found .trie-circle { fill: #052e16; stroke: #22c55e; stroke-width: 2.5; }
.trie-node-g.found .trie-text { fill: #bbf7d0; }
.trie-node-g.found .trie-word-ring { stroke: #22c55e; opacity: 0.9; }
.trie-node-g.dead-end .trie-circle { fill: #450a0a; stroke: #ef4444; stroke-width: 2.5; }
.trie-node-g.dead-end .trie-text { fill: #fecaca; }
.trie-edge.visiting { stroke: #818cf8; stroke-width: 2.5; }
.trie-edge.found { stroke: #22c55e; stroke-width: 2.5; }
.trie-edge.dead-end { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 5 3; }

/* ── Lookup cards ── */
.trie-bottom {
  display: flex;
  gap: 5px;
  margin-top: 4px;
  flex-shrink: 0;
  max-height: 110px;
  overflow: hidden;
}

.lk-card {
  flex: 1;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 4px 6px;
  min-width: 0;
  cursor: pointer;
  transition: border-color 0.2s;
}

.lk-card.lk-active { border-color: #818cf8; }
.lk-card.lk-found { border-color: #166534; }
.lk-card.lk-miss { border-color: #7f1d1d; }

.lk-word { font-size: 0.9rem; direction: rtl; text-align: center; font-weight: 600; margin-bottom: 2px; }

.lk-trace { display: flex; flex-direction: column; gap: 1px; }

.tr-step {
  font-size: 0.58rem;
  font-family: 'Courier New', monospace;
  color: #64748b;
  direction: rtl;
  opacity: 0;
  transition: opacity 0.25s;
  display: flex;
  align-items: center;
  gap: 3px;
  line-height: 1.3;
}

.tr-step.visible { opacity: 1; }
.tr-step.ok { color: #86efac; }
.tr-step.fail { color: #fca5a5; }

.tr-step .wb {
  background: #422006;
  color: #fbbf24;
  font-size: 0.5rem;
  padding: 0 3px;
  border-radius: 2px;
  direction: ltr;
  white-space: nowrap;
}

.lk-result {
  text-align: center;
  font-weight: 700;
  font-size: 0.6rem;
  padding: 2px 4px;
  border-radius: 4px;
  margin-top: 2px;
  opacity: 0;
  transition: opacity 0.3s;
}

.lk-result.visible { opacity: 1; }
.lk-result.lk-ok { color: #22c55e; background: #052e16; }
.lk-result.lk-no { color: #ef4444; background: #450a0a; }

/* ── Trie Animation (Simple Mode) ── */
.anim-status {
  text-align: center;
  padding: 6px 4px;
  min-height: 28px;
  flex-shrink: 0;
  font-size: 0.7rem;
  color: #64748b;
  border-top: 1px solid #1e293b;
}

.anim-word {
  font-size: 0.95rem;
  font-weight: 700;
  color: #818cf8;
  direction: rtl;
  display: inline-block;
}

.anim-found { color: #22c55e !important; font-weight: 600; }
.anim-dead { color: #ef4444 !important; font-weight: 600; }

/* Expansion list */
.exp-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
  scrollbar-color: #334155 transparent;
}

.exp-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.75rem;
  border: 1px solid transparent;
  transition: all 0.25s;
  flex-shrink: 0;
}

.exp-item .ew { direction: rtl; flex: 1; font-size: 0.85rem; }
.exp-item .ei { font-size: 0.55rem; color: #475569; min-width: 14px; }

.exp-item.exp-active { border-color: #818cf8; background: #1e1b4b; }
.exp-item.exp-found { border-color: #22c55e; background: #052e16; }
.exp-item.exp-dead { opacity: 0.35; }

@keyframes expPopIn {
  from { transform: translateX(8px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.exp-item.exp-enter { animation: expPopIn 0.12s ease-out forwards; }

@keyframes expShrink {
  to { max-height: 0; padding: 0; margin: 0; border: 0; opacity: 0; overflow: hidden; }
}
.exp-item.exp-move { animation: expShrink 0.3s ease-in forwards; }

/* Candidate with inline freq bar */
@keyframes candSlideIn {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.cand-item.anim-enter {
  animation: candSlideIn 0.35s ease-out forwards;
  opacity: 1;
  transform: none;
}

.cand-item .fb-wrap {
  flex: 1;
  height: 5px;
  background: #0f172a;
  border-radius: 3px;
  overflow: hidden;
}

.cand-item .fb {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease-out;
  width: 0;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
}

/* ── Results Panel ── */
.panel-results {
  grid-area: results;
  display: flex;
  flex-direction: column;
  padding: 8px;
  min-height: 0;
  gap: 6px;
}

.result-hero {
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
}

.result-arabic {
  font-size: 2.2rem;
  direction: rtl;
  background: linear-gradient(135deg, #22c55e, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  line-height: 1.2;
}

.result-arabic.visible { opacity: 1; transform: scale(1); }

.result-sub { color: #475569; font-size: 0.6rem; margin-top: 2px; }

.result-divider { border-top: 1px solid #334155; flex-shrink: 0; }

.cand-list { flex-shrink: 0; }

.cand-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 6px;
  border-radius: 5px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.25s;
  font-size: 0.8rem;
  cursor: pointer;
}

.cand-item.cand-hover { background: #1e293b; }

.cand-item.visible { opacity: 1; transform: translateY(0); }
.cand-item.cand-top { background: #1a2e05; border: 1px solid #365314; }

.cand-item .cr { color: #475569; font-size: 0.65rem; min-width: 16px; }
.cand-item .cr.star { color: #eab308; }
.cand-item .cw { font-size: 0.95rem; direction: rtl; flex: 1; }
.cand-item .cf { font-size: 0.55rem; color: #475569; }

.cand-sep { border-top: 1px dashed #334155; margin: 2px 0; opacity: 0; transition: opacity 0.3s; }
.cand-sep.visible { opacity: 1; }

</style>

<body>
<div class="app">
  <div class="top-bar">
    <h1>Laren</h1>
    <input type="text" id="input" placeholder="Type Arabizi... e.g. 7abibi" autocomplete="off" spellcheck="false">
    <div class="pipe-summary" id="pipe"></div>
    <div class="speed-control">
      <label for="speed-slider">Speed</label>
      <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1">
      <span id="speed-label">1x</span>
    </div>
  </div>

  <div id="dash" class="dash">
    <div class="empty-state">
      <div class="icon">&#x2328;&#xFE0F;</div>
      <p>Start typing to see the transliteration pipeline</p>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/mmaher88/laren">github.com/mmaher88/laren</a> &mdash; Install with <code>yay -S fcitx5-laren</code>
  </div>
</div>

<script>
// ── Arabizi mapping rules (mirrors rule_engine.cpp) ──
const MAPPINGS = {
  // Prime variants (3-char tokens)
  "3'": ["\u063A"], "7'": ["\u062E"], "6'": ["\u0638"], "9'": ["\u0636"],
  "d'": ["\u0630"], "t'": ["\u062B"], "s'": ["\u0634"],
  // Digraphs
  "sh": ["\u0634"], "kh": ["\u062E"], "gh": ["\u063A"],
  "th": ["\u062B", "\u0630"], "dh": ["\u0630", "\u0636"],
  "aa": ["\u0627", "\u0622"], "ee": ["\u064A"], "oo": ["\u0648"], "ou": ["\u0648"],
  "3h": ["\u063A"],
  // Doubled consonants
  "bb": ["\u0628"], "tt": ["\u062A","\u0637"], "dd": ["\u062F","\u0636"], "rr": ["\u0631"],
  "ss": ["\u0633","\u0635","\u062B"], "ff": ["\u0641"], "kk": ["\u0643"], "ll": ["\u0644"],
  "mm": ["\u0645"], "nn": ["\u0646"], "yy": ["\u064A"], "ww": ["\u0648"],
  "zz": ["\u0632"], "gg": ["\u062C"], "hh": ["\u0647"],
  // Numbers
  "2": ["\u0621","\u0623","\u0625","\u0624","\u0626","\u0642"],
  "3": ["\u0639"], "5": ["\u062E"],
  "6": ["\u0637"], "7": ["\u062D"], "8": ["\u0642"], "9": ["\u0635"],
  // Single letters
  "a": ["\u2205","\u0627","\u0623","\u0649","\u0647","\u0629"],
  "b": ["\u0628"], "t": ["\u062A","\u0637"],
  "g": ["\u062C"], "j": ["\u062C"], "d": ["\u062F","\u0636"], "r": ["\u0631"],
  "z": ["\u0632","\u0638","\u0630"], "s": ["\u0633","\u0635","\u062B"], "f": ["\u0641"],
  "q": ["\u0642"], "k": ["\u0642","\u0643"], "l": ["\u0644"], "m": ["\u0645"],
  "n": ["\u0646"], "h": ["\u0647","\u062D"], "w": ["\u0648"], "y": ["\u064A"],
  "i": ["\u2205","\u064A","\u0627","\u0623","\u0625"],
  "u": ["\u2205","\u0648","\u0623"], "o": ["\u2205","\u0648","\u0623"],
  "e": ["\u2205","\u064A","\u0627","\u0623","\u0625","\u0625\u064A"],
  "p": ["\u0628"], "v": ["\u0641"], "x": ["\u062E"], "c": ["\u0643"],
};

// ── Dictionary ──
let DICTIONARY = {};
let dictLoaded = false;

// ── Animation speed (lower = faster) ──
let animSpeed = 1;

document.getElementById('speed-slider').addEventListener('input', (e) => {
  animSpeed = 1 / parseFloat(e.target.value);
  document.getElementById('speed-label').textContent = e.target.value + 'x';
});

// ── Tokenize & DFS ──
function getMatchesAt(input, pos) {
  const results = [];
  const remaining = input.slice(pos).toLowerCase();
  for (const len of [3, 2, 1]) {
    const substr = remaining.slice(0, len);
    if (MAPPINGS[substr]) results.push({ latin: substr, arabic: MAPPINGS[substr], len });
  }
  return results;
}

function tokenize(input) {
  const tokens = [];
  let pos = 0;
  const lower = input.toLowerCase();
  while (pos < lower.length) {
    let found = false;
    for (const len of [3, 2, 1]) {
      const substr = lower.slice(pos, pos + len);
      if (MAPPINGS[substr]) {
        tokens.push({ latin: substr, arabic: MAPPINGS[substr], pos, len });
        pos += len;
        found = true;
        break;
      }
    }
    if (!found) pos++;
  }
  return tokens;
}

function expandDFS(input, maxResults = 2000) {
  const results = [];
  function dfs(pos, current) {
    if (results.length >= maxResults) return;
    if (pos >= input.length) { results.push(current.join("")); return; }
    const matches = getMatchesAt(input, pos);
    for (const match of matches) {
      for (const ar of match.arabic) {
        if (ar === "\u2205") { dfs(pos + match.len, current); }
        else { for (const ch of ar) current.push(ch); dfs(pos + match.len, current); for (let i = 0; i < ar.length; i++) current.pop(); }
      }
    }
  }
  dfs(0, []);
  return results;
}

// ══════════════════════════════════════════
// ── Simple Trie Engine ──
// ══════════════════════════════════════════
let simpleTrieNodeCounter = 0;
let simpleNodeMap = {};
let simpleTrieRoot = null;

function createSimpleTrieNode(char, depth) {
  return { char, depth, children: {}, isWord: false, freq: 0, word: '', id: 'tn' + (simpleTrieNodeCounter++), x: 0, y: 0, parent: null };
}

function buildVizTrie(words) {
  simpleTrieNodeCounter = 0;
  simpleNodeMap = {};
  const root = createSimpleTrieNode('', 0);
  root.id = 'troot';
  simpleNodeMap['troot'] = root;
  for (const [word, freq] of words) {
    let node = root;
    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      if (!node.children[ch]) {
        const child = createSimpleTrieNode(ch, i + 1);
        child.parent = node;
        node.children[ch] = child;
        simpleNodeMap[child.id] = child;
      }
      node = node.children[ch];
    }
    node.isWord = true;
    node.freq = freq;
    node.word = word;
  }
  simpleTrieRoot = root;
  return root;
}

function simpleTrieLookup(root, word) {
  const steps = [];
  let node = root;
  let lost = false;
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    if (!lost && node.children[ch]) {
      node = node.children[ch];
      steps.push({ nodeId: node.id, char: ch, prefix: word.slice(0, i + 1), found: true, isWord: node.isWord, wordFreq: node.freq });
    } else {
      lost = true;
      steps.push({ nodeId: null, char: ch, prefix: word.slice(0, i + 1), found: false, isWord: false });
    }
  }
  return { steps, matched: steps.length === word.length && steps.length > 0 && steps[steps.length - 1].found };
}

function layoutSimpleTrie(root) {
  const NODE_W = 48, ROW_H = 56;
  function subtreeWidth(node) {
    const kids = Object.values(node.children);
    if (kids.length === 0) return NODE_W;
    return Math.max(kids.reduce((s, c) => s + subtreeWidth(c), 0), NODE_W);
  }
  function position(node, cx, cy) {
    node.x = cx; node.y = cy;
    const kids = Object.values(node.children);
    const totalW = kids.reduce((s, c) => s + subtreeWidth(c), 0);
    let x = cx - totalW / 2;
    for (const child of kids) {
      const w = subtreeWidth(child);
      position(child, x + w / 2, cy + ROW_H);
      x += w;
    }
  }
  position(root, 0, 24);
  let minX = Infinity, maxX = -Infinity, maxY = 0;
  function bounds(node) {
    minX = Math.min(minX, node.x); maxX = Math.max(maxX, node.x); maxY = Math.max(maxY, node.y);
    for (const c of Object.values(node.children)) bounds(c);
  }
  bounds(root);
  return { minX: minX - 28, maxX: maxX + 28, maxY: maxY + 28, width: maxX - minX + 56, height: maxY + 52 };
}

function simpleTrieToSVG(root, bounds) {
  const pad = 8;
  const vx = bounds.minX - pad, vw = bounds.width + pad * 2, vh = bounds.height + pad;
  let svg = `<svg class="trie-svg" viewBox="${vx} 0 ${vw} ${vh}" preserveAspectRatio="xMidYMid meet">`;
  function drawEdges(node) {
    for (const child of Object.values(node.children)) {
      svg += `<line class="trie-edge" id="edge-${child.id}" x1="${node.x}" y1="${node.y}" x2="${child.x}" y2="${child.y}"/>`;
      drawEdges(child);
    }
  }
  drawEdges(root);
  function drawNodes(node) {
    const cls = node.isWord ? 'word-node' : '';
    svg += `<g class="trie-node-g ${cls}" id="node-${node.id}">`;
    if (node.isWord) svg += `<circle cx="${node.x}" cy="${node.y}" r="20" class="trie-word-ring"/>`;
    svg += `<circle cx="${node.x}" cy="${node.y}" r="16" class="trie-circle"/>`;
    svg += `<text x="${node.x}" y="${node.y}" dy="0.38em" text-anchor="middle" class="trie-text">${node.char || '\u25CF'}</text></g>`;
    for (const child of Object.values(node.children)) drawNodes(child);
  }
  drawNodes(root);
  svg += '</svg>';
  return svg;
}

function selectTrieWords(dictMatches, expansions) {
  const words = new Map();
  for (const m of dictMatches.slice(0, 8)) words.set(m.word, m.freq);
  const prefixes = new Set();
  for (const [w] of words) { if (w.length >= 2) prefixes.add(w.slice(0, 2)); if (w.length >= 1) prefixes.add(w.slice(0, 1)); }
  for (const e of expansions.slice(0, 15)) { if (e.length >= 2) prefixes.add(e.slice(0, 2)); if (e.length >= 1) prefixes.add(e.slice(0, 1)); }
  const cands = [];
  for (const dw in DICTIONARY) {
    if (words.has(dw) || dw.length > 20) continue;
    for (const pfx of prefixes) { if (dw.startsWith(pfx)) { cands.push([dw, DICTIONARY[dw]]); break; } }
    if (cands.length >= 400) break;
  }
  cands.sort((a, b) => b[1] - a[1]);
  for (const [dw, df] of cands) { if (words.size >= 24) break; words.set(dw, df); }
  return words;
}

function selectLookupCandidates(dictMatches, expansions, trieRoot) {
  const candidates = [], seen = new Set();
  for (const m of dictMatches.slice(0, 2)) {
    if (!seen.has(m.word)) { candidates.push({ word: m.word, inDict: true, freq: m.freq }); seen.add(m.word); }
  }
  let bestNM = null, bestD = 0;
  for (const exp of expansions) {
    if (DICTIONARY[exp] || seen.has(exp) || exp.length === 0) continue;
    const { steps } = simpleTrieLookup(trieRoot, exp);
    const d = steps.filter(s => s.found).length;
    if (d > bestD || (d === bestD && exp.length > (bestNM || '').length)) { bestD = d; bestNM = exp; }
    if (d >= 3) break;
  }
  if (bestNM) candidates.push({ word: bestNM, inDict: false, freq: 0 });
  else { for (const exp of expansions) { if (!DICTIONARY[exp] && !seen.has(exp) && exp.length > 0) { candidates.push({ word: exp, inDict: false, freq: 0 }); break; } } }
  return candidates;
}

// Simple trie path highlighting
let simpleActiveWord = null;

function clearSimpleTrieHighlights() {
  document.querySelectorAll('.trie-node-g').forEach(n => n.classList.remove('visiting', 'found', 'dead-end', 'current'));
  document.querySelectorAll('.trie-edge').forEach(e => e.classList.remove('visiting', 'found', 'dead-end'));
}

function showSimpleWordPath(word) {
  clearSimpleTrieHighlights();
  if (!word || !simpleTrieRoot) return;
  const { steps, matched } = simpleTrieLookup(simpleTrieRoot, word);
  const isFound = !!DICTIONARY[word] && matched;
  const okSteps = steps.filter(s => s.found);
  if (okSteps.length === 0) return;
  const rootEl = document.getElementById('node-troot');
  if (rootEl) rootEl.classList.add(isFound ? 'found' : 'visiting');
  okSteps.forEach((step, i) => {
    const n = document.getElementById(`node-${step.nodeId}`);
    const e = document.getElementById(`edge-${step.nodeId}`);
    if (isFound) {
      if (n) n.classList.add('found');
      if (e) e.classList.add('found');
    } else if (i === okSteps.length - 1) {
      if (n) n.classList.add('dead-end');
      if (e) e.classList.add('dead-end');
    } else {
      if (n) n.classList.add('visiting');
      if (e) e.classList.add('visiting');
    }
  });
}

function setSimpleActiveCandidate(word) {
  document.querySelectorAll('.cand-item').forEach(el => el.classList.toggle('cand-hover', el.dataset.word === word));
  document.querySelectorAll('.lk-card').forEach(el => el.classList.toggle('lk-active', el.dataset.word === word));
  showSimpleWordPath(word);
}

function setupSimpleTrieInteraction() {
  const firstCand = document.querySelector('.cand-item[data-word]');
  simpleActiveWord = firstCand?.dataset.word || null;
  setTimeout(() => setSimpleActiveCandidate(simpleActiveWord), 200);
  document.querySelectorAll('.cand-item[data-word]').forEach(el => {
    el.addEventListener('mouseenter', () => setSimpleActiveCandidate(el.dataset.word));
    el.addEventListener('mouseleave', () => setSimpleActiveCandidate(simpleActiveWord));
  });
  document.querySelectorAll('.lk-card[data-word]').forEach(card => {
    card.addEventListener('mouseenter', () => setSimpleActiveCandidate(card.dataset.word));
    card.addEventListener('mouseleave', () => setSimpleActiveCandidate(simpleActiveWord));
  });
}

// ══════════════════════════════════════════
// ── Trie Animation Engine (Simple Mode) ──
// ══════════════════════════════════════════
let animController = null;

function animDelay(ms) {
  return new Promise(r => setTimeout(r, ms * animSpeed));
}

// Build ordered expansion list: all unique forms in DFS order
function selectExpansionList(expansions) {
  const list = [], seen = new Set();
  for (const exp of expansions) {
    if (exp.length > 0 && !seen.has(exp)) {
      seen.add(exp);
      list.push({ word: exp, freq: DICTIONARY[exp] || 0, isMatch: !!DICTIONARY[exp] });
    }
  }
  return list;
}

async function runSimpleAnimation(expList, allMatches, totalExpansions) {
  if (animController) animController.abort();
  const ctrl = new AbortController();
  animController = ctrl;

  const statusEl = document.getElementById('anim-status');
  const heroEl = document.querySelector('.result-arabic');
  const candListEl = document.getElementById('anim-cand-list');
  const expListEl = document.getElementById('anim-exp-list');
  const expLabel = document.getElementById('anim-exp-label');

  if (!statusEl || !candListEl || !expListEl) return;

  // ── Phase 1: Populate expansion list ──
  statusEl.innerHTML = 'Expanding forms...';
  for (let i = 0; i < expList.length; i++) {
    if (ctrl.signal.aborted) return;
    const item = expList[i];
    const el = document.createElement('div');
    el.className = 'exp-item exp-enter';
    el.id = `exp-${i}`;
    el.innerHTML = `<span class="ei">${i+1}.</span><span class="ew">${item.word}</span>`;
    expListEl.appendChild(el);
    await animDelay(50);
  }
  if (expLabel) expLabel.textContent = `Expansions (${expList.length})`;

  await animDelay(500);
  if (ctrl.signal.aborted) return;

  // ── Phase 2: Evaluate each against trie ──
  let matchesFound = 0;

  for (let i = 0; i < expList.length; i++) {
    if (ctrl.signal.aborted) return;
    const item = expList[i];
    const expEl = document.getElementById(`exp-${i}`);
    if (!expEl) continue;

    // Highlight current item & scroll into view
    expEl.classList.add('exp-active');
    expEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    statusEl.innerHTML = `Testing <span class="anim-word">${item.word}</span>`;

    // Walk trie node by node
    clearSimpleTrieHighlights();
    const rootEl = document.getElementById('node-troot');
    if (rootEl) rootEl.classList.add('visiting');

    let node = simpleTrieRoot;
    let lastNodeId = null;
    let walkedAll = true;

    for (let ci = 0; ci < item.word.length; ci++) {
      if (ctrl.signal.aborted) return;
      const ch = item.word[ci];
      if (!node.children[ch]) { walkedAll = false; break; }
      node = node.children[ch];
      lastNodeId = node.id;

      await animDelay(150);
      if (ctrl.signal.aborted) return;

      const nEl = document.getElementById(`node-${node.id}`);
      const eEl = document.getElementById(`edge-${node.id}`);
      if (nEl) nEl.classList.add('visiting');
      if (eEl) eEl.classList.add('visiting');
    }

    await animDelay(150);
    if (ctrl.signal.aborted) return;

    const isFound = walkedAll && node.isWord && item.isMatch;

    if (isFound) {
      // Flash path green
      clearSimpleTrieHighlights();
      if (rootEl) rootEl.classList.add('found');
      let n = simpleTrieRoot;
      for (const ch of item.word) {
        n = n.children[ch];
        const nEl = document.getElementById(`node-${n.id}`);
        const eEl = document.getElementById(`edge-${n.id}`);
        if (nEl) nEl.classList.add('found');
        if (eEl) eEl.classList.add('found');
      }

      // Flash green in expansion list, then remove
      expEl.classList.remove('exp-active');
      expEl.classList.add('exp-found');
      await animDelay(350);
      if (ctrl.signal.aborted) return;
      expEl.classList.add('exp-move');
      await animDelay(400);
      if (ctrl.signal.aborted) return;
      expEl.remove();

      // Insert into candidate list sorted by frequency
      matchesFound++;
      insertCandidateByFreq(candListEl, item.word, item.freq);

      // Update hero
      if (matchesFound === 1 && heroEl) {
        heroEl.textContent = item.word;
        heroEl.classList.add('visible');
      } else if (heroEl && item.freq > parseInt(heroEl.dataset.freq || '0')) {
        heroEl.textContent = item.word;
        heroEl.dataset.freq = item.freq;
      }

      statusEl.innerHTML = `<span class="anim-word">${item.word}</span> <span class="anim-found">\u2713 ${item.freq}</span>`;
      await animDelay(250);
    } else {
      // Dead end
      if (lastNodeId) {
        const nEl = document.getElementById(`node-${lastNodeId}`);
        const eEl = document.getElementById(`edge-${lastNodeId}`);
        if (nEl) { nEl.classList.remove('visiting'); nEl.classList.add('dead-end'); }
        if (eEl) { eEl.classList.remove('visiting'); eEl.classList.add('dead-end'); }
      }

      expEl.classList.remove('exp-active');
      expEl.classList.add('exp-dead');

      statusEl.innerHTML = `<span class="anim-word">${item.word}</span> <span class="anim-dead">\u2717</span>`;
      await animDelay(200);
    }

    clearSimpleTrieHighlights();
    await animDelay(60);
  }

  if (ctrl.signal.aborted) return;

  // ── Phase 3: Final state ──
  statusEl.innerHTML = `<span style="color:#22c55e">\u2713</span> ${matchesFound} matches from ${totalExpansions} forms`;
  if (expLabel) expLabel.textContent = `Fallback (${expList.length - matchesFound})`;

  // Enable hover interaction
  simpleActiveWord = allMatches[0]?.word || null;
  setupSimpleTrieInteraction();
  if (simpleActiveWord) setSimpleActiveCandidate(simpleActiveWord);
}

function insertCandidateByFreq(container, word, freq) {
  const existing = container.querySelectorAll('.cand-item');
  let insertBefore = null;

  for (const el of existing) {
    if (freq > parseInt(el.dataset.freq || '0')) {
      insertBefore = el;
      break;
    }
  }

  const el = document.createElement('div');
  el.className = 'cand-item anim-enter';
  el.dataset.word = word;
  el.dataset.freq = freq;
  const pct = (freq / 8000 * 100).toFixed(0);
  el.innerHTML = `<span class="cr"></span><span class="cw">${word}</span><div class="fb-wrap"><div class="fb" style="width:0" data-width="${pct}%"></div></div><span class="cf">${freq}</span>`;

  if (insertBefore) {
    container.insertBefore(el, insertBefore);
  } else {
    container.appendChild(el);
  }

  // Re-number all ranks
  container.querySelectorAll('.cand-item').forEach((item, idx) => {
    const cr = item.querySelector('.cr');
    if (idx === 0) {
      cr.className = 'cr star';
      cr.textContent = '\u2605';
      item.classList.add('cand-top');
    } else {
      cr.className = 'cr';
      cr.textContent = `${idx+1}.`;
      item.classList.remove('cand-top');
    }
  });

  // Animate frequency bar
  requestAnimationFrame(() => {
    const bar = el.querySelector('.fb');
    if (bar) setTimeout(() => { bar.style.width = bar.dataset.width; }, 50);
  });
}

// ══════════════════════════════════════════
// ── Load dictionary ──
// ══════════════════════════════════════════
(async function() {
  const dashEl = document.getElementById("dash");
  dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u23F3</div><p>Loading dictionary...</p></div>';
  try {
    const resp = await fetch("dictionary.json");
    DICTIONARY = await resp.json();
    dictLoaded = true;

    const n = Object.keys(DICTIONARY).length.toLocaleString();
    dashEl.innerHTML = `<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p><p class="sub">${n} words loaded</p></div>`;
    document.getElementById("input").focus();
  } catch (e) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u26A0\uFE0F</div><p>Could not load dictionary. Try refreshing.</p></div>';
  }
})();



// ══════════════════════════════════════════
// ── Rendering ──
// ══════════════════════════════════════════
const inputEl = document.getElementById("input");
const dashEl = document.getElementById("dash");
const pipeEl = document.getElementById("pipe");
let debounceTimer;


inputEl.addEventListener("input", () => {
  if (!dictLoaded) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(inputEl.value), 120);
});

function render(raw) {
  const input = raw.trim().toLowerCase();
  // Abort any running animation
  if (animController) { animController.abort(); animController = null; }

  if (!input) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p></div>';
    pipeEl.innerHTML = '';
    return;
  }

  const tokens = tokenize(input);
  if (tokens.length === 0) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u2753</div><p>No recognized Arabizi characters</p></div>';
    pipeEl.innerHTML = '';
    return;
  }

  const expansions = expandDFS(input, 2000);
  const dictMatches = expansions.filter(e => DICTIONARY[e]).map(e => ({ word: e, freq: DICTIONARY[e] })).sort((a, b) => b.freq - a.freq);
  const seen = new Set();
  const uniqueMatches = [];
  for (const m of dictMatches) { if (!seen.has(m.word)) { seen.add(m.word); uniqueMatches.push(m); } }
  const skeletal = [];
  const seenSkel = new Set(uniqueMatches.map(m => m.word));
  for (const e of expansions) { if (!seenSkel.has(e) && e.length > 0) { seenSkel.add(e); skeletal.push(e); if (skeletal.length >= 5) break; } }

  let branchCount = 1;
  for (const t of tokens) branchCount *= t.arabic.length;

  // Pipeline summary
  pipeEl.innerHTML = `<span class="pv">${input}</span><span class="pa">\u2192</span><span class="pv">${tokens.length}</span><span class="pa">tokens \u2192</span><span class="pv">${expansions.length}</span><span class="pa">forms \u2192</span><span class="pv">${uniqueMatches.length}</span><span class="pa">matches \u2192 ranked</span>`;

  // Abort any running animation
  if (animController) { animController.abort(); animController = null; }

  const trieWords = selectTrieWords(uniqueMatches, expansions);
  const trieRoot = buildVizTrie(trieWords);
  const expList = selectExpansionList(expansions);

  dashEl.innerHTML = `<div class="dash-grid">
    <div class="panel panel-mappings" data-p="0">${buildMappings(tokens, branchCount, expansions.length)}</div>
    <div class="panel panel-trie" data-p="1">${buildTriePanel(trieRoot, trieWords.size)}</div>
    <div class="panel panel-results" data-p="2">${buildEmptyResults()}</div>
  </div>`;

  animateDashboard();

  // Start animated walkthrough after panels appear
  setTimeout(() => {
    runSimpleAnimation(expList, uniqueMatches, expansions.length);
  }, 400);
}

function buildMappings(tokens, branchCount, actualCount) {
  let cards = "";
  tokens.forEach((t, i) => {
    const opts = t.arabic.map(ar => {
      if (ar === "\u2205") return '<span class="ar-opt skip">skip</span>';
      return `<span class="ar-opt">${ar}</span>`;
    }).join(" ");
    cards += `<div class="m-card" data-delay="${i * 40}"><div class="lat">${t.latin}</div><div class="ar-opts">${opts}</div><div class="cnt">${t.arabic.length}</div></div>`;
  });

  const eq = tokens.map(t => `<span class="bv">${t.arabic.length}</span>`).join('<span class="bm">\u00D7</span>');
  const info = actualCount < branchCount ? `${actualCount} explored` : 'all explored';

  return `<div class="panel-label"><span class="num">1</span>Character mappings</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="mapping-cards">${cards}</div>
      <div class="branch-eq">${eq}<span class="bm">=</span><span class="bt">${branchCount.toLocaleString()}</span><span class="bi">(${info})</span></div>
    </div>`;
}

function buildTriePanel(trieRoot, trieWordCount) {
  const bounds = layoutSimpleTrie(trieRoot);
  const svg = simpleTrieToSVG(trieRoot, bounds);

  return `<div class="trie-top">
      <div class="panel-label"><span class="num">2</span>Trie lookup <span style="font-weight:400;text-transform:none">(${trieWordCount} nearby words)</span></div>
      <div class="trie-controls">
        <div class="trie-legend">
          <span class="trie-legend-item"><span class="lg-circle lg-default"></span>node</span>
          <span class="trie-legend-item"><span class="lg-circle lg-word"></span>word</span>
          <span class="trie-legend-item"><span class="lg-circle lg-found"></span>found</span>
          <span class="trie-legend-item"><span class="lg-circle lg-dead"></span>dead end</span>
        </div>
      </div>
    </div>
    <div class="trie-svg-area">${svg}</div>
    <div class="anim-status" id="anim-status"></div>`;
}

function buildEmptyResults() {
  return `<div class="result-hero">
      <div class="result-arabic" data-delay="100"></div>
      <div class="result-sub">Press Space to insert</div>
    </div>
    <div class="result-divider"></div>
    <div class="panel-label"><span class="num">3</span>Candidates</div>
    <div class="cand-list" id="anim-cand-list"></div>
    <div class="result-divider"></div>
    <div class="panel-label" id="anim-exp-label">Expansions</div>
    <div class="exp-list" id="anim-exp-list"></div>`;
}

// ── Animation ──
function animateDashboard() {
  document.querySelectorAll(".panel").forEach((el, i) => {
    setTimeout(() => el.classList.add("visible"), i * 60);
  });

  document.querySelectorAll(".m-card").forEach(el => {
    const d = parseInt(el.dataset.delay || 0);
    setTimeout(() => el.classList.add("visible"), d + 150);
  });
}
