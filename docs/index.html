<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laren — Interactive Transliteration Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 8px 14px;
  gap: 5px;
  min-width: 900px;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  padding: 2px 0;
}

.top-bar h1 {
  font-size: 1.25rem;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.top-bar input {
  flex: 1;
  max-width: 360px;
  font-size: 1.1rem;
  padding: 5px 14px;
  border-radius: 8px;
  border: 2px solid #334155;
  background: #1e293b;
  color: #f1f5f9;
  outline: none;
  transition: border-color 0.3s;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.12em;
}

.top-bar input:focus { border-color: #818cf8; }
.top-bar input::placeholder { color: #475569; letter-spacing: 0.05em; font-size: 0.9rem; }

.top-bar .pipe-summary {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: #64748b;
  flex-shrink: 0;
}

.top-bar .pipe-summary .pv { color: #94a3b8; font-weight: 600; }
.top-bar .pipe-summary .pa { color: #475569; }

.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 2px 0;
  font-size: 0.72rem;
}

.footer a { color: #818cf8; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer code { color: #94a3b8; }

/* ── Dashboard ── */
.dash {
  flex: 1;
  min-height: 0;
  display: flex;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: #475569;
  gap: 8px;
}

.empty-state .icon { font-size: 2.5rem; }
.empty-state .sub { font-size: 0.75rem; color: #334155; }

.dash-grid {
  display: grid;
  flex: 1;
  min-height: 0;
  grid-template-rows: auto 1fr;
  grid-template-columns: 1fr 240px;
  grid-template-areas:
    "mappings mappings"
    "trie     results";
  gap: 5px;
}

/* ── Panels ── */
.panel {
  background: #1e293b;
  border-radius: 8px;
  border: 1px solid #334155;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}

.panel.visible { opacity: 1; }

.panel-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.panel-label .num {
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  color: #0f172a;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  font-weight: 800;
}

/* ── Mappings Panel ── */
.panel-mappings {
  grid-area: mappings;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  flex-wrap: wrap;
}

.mapping-cards {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.m-card {
  background: #0f172a;
  border-radius: 6px;
  padding: 3px 6px;
  text-align: center;
  border: 1px solid #334155;
  min-width: 44px;
  opacity: 0;
  transform: scale(0.85);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.m-card.visible { opacity: 1; transform: scale(1); }

.m-card .lat {
  font-size: 0.85rem;
  font-weight: 700;
  color: #38bdf8;
  font-family: 'Courier New', monospace;
  line-height: 1.1;
}

.m-card .ar-opts {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  margin-top: 1px;
}

.m-card .ar-opt {
  font-size: 0.7rem;
  color: #94a3b8;
  direction: rtl;
}

.m-card .ar-opt.skip {
  color: #22c55e;
  font-size: 0.55rem;
  font-style: italic;
  direction: ltr;
}

.m-card .cnt { font-size: 0.5rem; color: #475569; margin-top: 1px; }

.branch-eq {
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
  color: #64748b;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
}

.branch-eq .bv { color: #38bdf8; }
.branch-eq .bm { color: #818cf8; }
.branch-eq .bt { color: #22c55e; font-weight: 700; font-size: 0.85rem; }
.branch-eq .bi { font-size: 0.6rem; color: #475569; margin-left: 4px; }

/* ── Trie Panel ── */
.panel-trie {
  grid-area: trie;
  display: flex;
  flex-direction: column;
  padding: 6px 8px;
  min-height: 0;
}

.trie-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
  flex-shrink: 0;
}

.trie-controls {
  display: flex;
  gap: 4px;
  align-items: center;
}

.trie-controls > button {
  background: #0f172a;
  border: 1px solid #334155;
  color: #94a3b8;
  border-radius: 4px;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}

.trie-controls > button:hover { border-color: #818cf8; color: #e2e8f0; }

.trie-stats {
  font-size: 0.55rem;
  color: #475569;
  margin: 0 6px;
}

/* ── Mode Toggle ── */
.mode-toggle {
  display: flex;
  background: #0f172a;
  border-radius: 4px;
  border: 1px solid #334155;
  overflow: hidden;
  margin: 0 6px;
}

.mode-toggle button {
  background: transparent;
  border: none;
  color: #64748b;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 3px 8px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.mode-toggle button:hover { color: #94a3b8; }
.mode-toggle button.active {
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  color: #0f172a;
}

.trie-legend {
  display: flex;
  gap: 8px;
  font-size: 0.6rem;
  color: #64748b;
}

.trie-legend-item { display: flex; align-items: center; gap: 3px; }

.lg-circle {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid;
}

.lg-circle.lg-default { background: #1e293b; border-color: #475569; }
.lg-circle.lg-word { background: #1e293b; border-color: #475569; outline: 1.5px solid #854d0e; outline-offset: 1px; }
.lg-circle.lg-found { background: #052e16; border-color: #22c55e; }
.lg-circle.lg-collapsed { background: #1e1b4b; border-color: #818cf8; }
.lg-circle.lg-dead { background: #450a0a; border-color: #ef4444; }

.trie-svg-area {
  flex: 1;
  min-height: 0;
  background: #0f172a;
  border-radius: 6px;
  border: 1px solid #1e293b;
  position: relative;
  overflow: hidden;
}

.trie-svg-area.pannable { cursor: grab; }

.trie-svg-area.panning { cursor: grabbing; }

.trie-svg-area svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Shared trie node styles ── */
.trie-circle { fill: #1e293b; stroke: #475569; stroke-width: 2; transition: fill 0.3s, stroke 0.3s; }
.trie-word-ring { fill: none; stroke: #854d0e; stroke-width: 2; opacity: 0.5; transition: stroke 0.3s, opacity 0.3s; }
.trie-text { fill: #94a3b8; font-size: 14px; font-family: 'Segoe UI', system-ui, sans-serif; transition: fill 0.3s; pointer-events: none; }
.trie-edge { stroke: #334155; stroke-width: 1.5; transition: stroke 0.3s, stroke-width 0.3s; }
.trie-badge { font-size: 9px; fill: #818cf8; pointer-events: none; }

.trie-node-g { cursor: pointer; }
.trie-node-g:hover .trie-circle { stroke: #818cf8; stroke-width: 2.5; }

/* Full mode: collapsed node */
.trie-node-g.collapsed .trie-circle { fill: #1e1b4b; stroke: #818cf8; }
.trie-node-g.collapsed .trie-text { fill: #c7d2fe; }

/* Full mode: search path highlights */
.trie-node-g.on-path .trie-circle { fill: #052e16; stroke: #22c55e; stroke-width: 2.5; }
.trie-node-g.on-path .trie-text { fill: #bbf7d0; }
.trie-node-g.on-path .trie-word-ring { stroke: #22c55e; opacity: 0.9; }
.trie-edge.on-path { stroke: #22c55e; stroke-width: 2.5; }

/* Simple mode: visiting/found/dead-end highlights */
.trie-node-g.visiting .trie-circle { fill: #1e1b4b; stroke: #818cf8; stroke-width: 2.5; }
.trie-node-g.visiting .trie-text { fill: #c7d2fe; }
.trie-node-g.visiting .trie-word-ring { stroke: #818cf8; opacity: 0.8; }
.trie-node-g.found .trie-circle { fill: #052e16; stroke: #22c55e; stroke-width: 2.5; }
.trie-node-g.found .trie-text { fill: #bbf7d0; }
.trie-node-g.found .trie-word-ring { stroke: #22c55e; opacity: 0.9; }
.trie-node-g.dead-end .trie-circle { fill: #450a0a; stroke: #ef4444; stroke-width: 2.5; }
.trie-node-g.dead-end .trie-text { fill: #fecaca; }
.trie-edge.visiting { stroke: #818cf8; stroke-width: 2.5; }
.trie-edge.found { stroke: #22c55e; stroke-width: 2.5; }
.trie-edge.dead-end { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 5 3; }

/* Tooltip (full mode) */
.trie-tooltip {
  position: absolute;
  background: #1e293b;
  border: 1px solid #475569;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.7rem;
  color: #e2e8f0;
  pointer-events: none;
  z-index: 10;
  display: none;
  direction: rtl;
  max-width: 200px;
}

.trie-tooltip.show { display: block; }
.trie-tooltip .tt-char { font-size: 1.1rem; font-weight: 700; }
.trie-tooltip .tt-info { font-size: 0.6rem; color: #94a3b8; direction: ltr; margin-top: 2px; }

/* ── Simple mode: lookup cards ── */
.trie-bottom {
  display: flex;
  gap: 5px;
  margin-top: 4px;
  flex-shrink: 0;
  max-height: 110px;
  overflow: hidden;
}

.lk-card {
  flex: 1;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 4px 6px;
  min-width: 0;
  cursor: pointer;
  transition: border-color 0.2s;
}

.lk-card.lk-active { border-color: #818cf8; }
.lk-card.lk-found { border-color: #166534; }
.lk-card.lk-miss { border-color: #7f1d1d; }

.lk-word { font-size: 0.9rem; direction: rtl; text-align: center; font-weight: 600; margin-bottom: 2px; }

.lk-trace { display: flex; flex-direction: column; gap: 1px; }

.tr-step {
  font-size: 0.58rem;
  font-family: 'Courier New', monospace;
  color: #64748b;
  direction: rtl;
  opacity: 0;
  transition: opacity 0.25s;
  display: flex;
  align-items: center;
  gap: 3px;
  line-height: 1.3;
}

.tr-step.visible { opacity: 1; }
.tr-step.ok { color: #86efac; }
.tr-step.fail { color: #fca5a5; }

.tr-step .wb {
  background: #422006;
  color: #fbbf24;
  font-size: 0.5rem;
  padding: 0 3px;
  border-radius: 2px;
  direction: ltr;
  white-space: nowrap;
}

.lk-result {
  text-align: center;
  font-weight: 700;
  font-size: 0.6rem;
  padding: 2px 4px;
  border-radius: 4px;
  margin-top: 2px;

  transition: opacity 0.3s;
}

.lk-result.visible { opacity: 1; }
.lk-result.lk-ok { color: #22c55e; background: #052e16; }
.lk-result.lk-no { color: #ef4444; background: #450a0a; }

/* ── Results Panel ── */
.panel-results {
  grid-area: results;
  display: flex;
  flex-direction: column;
  padding: 8px;
  min-height: 0;
  gap: 6px;
}

.result-hero {
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
}

.result-arabic {
  font-size: 2.2rem;
  direction: rtl;
  background: linear-gradient(135deg, #22c55e, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);

.result-arabic.visible { opacity: 1; transform: scale(1); }

.result-sub { color: #475569; font-size: 0.6rem; margin-top: 2px; }

.result-divider { border-top: 1px solid #334155; flex-shrink: 0; }

.cand-list { flex-shrink: 0; }

.cand-item {

.cand-item.cand-hover { background: #1e293b; }

.cand-item.visible { opacity: 1; transform: translateY(0); }
.cand-item.cand-top { background: #1a2e05; border: 1px solid #365314; }

.cand-item .cr { color: #475569; font-size: 0.65rem; min-width: 16px; }
.cand-item .cr.star { color: #eab308; }
.cand-item .cw { font-size: 0.95rem; direction: rtl; flex: 1; }
.cand-item .cf { font-size: 0.55rem; color: #475569; }

.cand-sep { border-top: 1px dashed #334155; margin: 2px 0; opacity: 0; transition: opacity 0.3s; }
.cand-sep.visible { opacity: 1; }

.freq-section {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.freq-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 4px;
  border-radius: 5px;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s;
  flex-shrink: 0;
}

.freq-row.visible { opacity: 1; transform: translateX(0); }
.freq-row.fr-match { background: #052e16; border: 1px solid #166534; }
.freq-row.fr-fall { opacity: 0.5; }

.freq-row .fa { font-size: 0.9rem; direction: rtl; min-width: 60px; text-align: center; }
.freq-row .fb-wrap { flex: 1; height: 5px; background: #0f172a; border-radius: 3px; overflow: hidden; }

.freq-row.fr-match .fb { background: linear-gradient(90deg, #22c55e, #38bdf8); }
.freq-row .fl { font-size: 0.55rem; color: #64748b; min-width: 50px; text-align: right; }

.freq-header {
  font-size: 0.55rem;
  color: #475569;
  text-align: center;
  flex-shrink: 0;
}

<body>
<div class="app">
  <div class="top-bar">
    <h1>Laren</h1>
    <input type="text" id="input" placeholder="Type Arabizi... e.g. 7abibi" autocomplete="off" spellcheck="false">
    <div class="pipe-summary" id="pipe"></div>
  </div>

  <div id="dash" class="dash">
    <div class="empty-state">
      <div class="icon">&#x2328;&#xFE0F;</div>
      <p>Start typing to see the transliteration pipeline</p>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/mmaher88/laren">github.com/mmaher88/laren</a> &mdash; Install with <code>yay -S fcitx5-laren</code>
  </div>
</div>

<script>
// ── Arabizi mapping rules (mirrors rule_engine.cpp) ──
const MAPPINGS = {
  // Prime variants (3-char tokens)
  "3'": ["\u063A"], "7'": ["\u062E"], "6'": ["\u0638"], "9'": ["\u0636"],
  "d'": ["\u0630"], "t'": ["\u062B"], "s'": ["\u0634"],
  // Digraphs
  "sh": ["\u0634"], "kh": ["\u062E"], "gh": ["\u063A"],
  "th": ["\u062B", "\u0630"], "dh": ["\u0630", "\u0636"],
  "aa": ["\u0627", "\u0622"], "ee": ["\u064A"], "oo": ["\u0648"], "ou": ["\u0648"],
  "3h": ["\u063A"],
  // Doubled consonants
  "bb": ["\u0628"], "tt": ["\u062A","\u0637"], "dd": ["\u062F","\u0636"], "rr": ["\u0631"],
  "ss": ["\u0633","\u0635","\u062B"], "ff": ["\u0641"], "kk": ["\u0643"], "ll": ["\u0644"],
  "mm": ["\u0645"], "nn": ["\u0646"], "yy": ["\u064A"], "ww": ["\u0648"],
  "zz": ["\u0632"], "gg": ["\u062C"], "hh": ["\u0647"],
  // Numbers
  "2": ["\u0621","\u0623","\u0625","\u0624","\u0626","\u0642"],
  "3": ["\u0639"], "5": ["\u062E"],
  "6": ["\u0637"], "7": ["\u062D"], "8": ["\u0642"], "9": ["\u0635"],
  // Single letters
  "a": ["\u2205","\u0627","\u0623","\u0649","\u0647","\u0629"],
  "b": ["\u0628"], "t": ["\u062A","\u0637"],
  "g": ["\u062C"], "j": ["\u062C"], "d": ["\u062F","\u0636"], "r": ["\u0631"],
  "z": ["\u0632","\u0638","\u0630"], "s": ["\u0633","\u0635","\u062B"], "f": ["\u0641"],
  "q": ["\u0642"], "k": ["\u0642","\u0643"], "l": ["\u0644"], "m": ["\u0645"],
  "n": ["\u0646"], "h": ["\u0647","\u062D"], "w": ["\u0648"], "y": ["\u064A"],
  "i": ["\u2205","\u064A","\u0627","\u0623","\u0625"],
  "u": ["\u2205","\u0648","\u0623"], "o": ["\u2205","\u0648","\u0623"],
  "e": ["\u2205","\u064A","\u0627","\u0623","\u0625","\u0625\u064A"],
  "p": ["\u0628"], "v": ["\u0641"], "x": ["\u062E"], "c": ["\u0643"],
};

// ── Dictionary ──
let DICTIONARY = {};
let dictLoaded = false;

// ── Trie mode: 'simple' or 'full' ──
let trieMode = 'simple';

// ── Tokenize & DFS ──
function getMatchesAt(input, pos) {
  const results = [];
  const remaining = input.slice(pos).toLowerCase();
  for (const len of [3, 2, 1]) {
    const substr = remaining.slice(0, len);
    if (MAPPINGS[substr]) results.push({ latin: substr, arabic: MAPPINGS[substr], len });
  }
  return results;
}

function tokenize(input) {
  const tokens = [];
  let pos = 0;
  const lower = input.toLowerCase();
  while (pos < lower.length) {
    let found = false;
    for (const len of [3, 2, 1]) {
      const substr = lower.slice(pos, pos + len);
      if (MAPPINGS[substr]) {
        tokens.push({ latin: substr, arabic: MAPPINGS[substr], pos, len });
        pos += len;
        found = true;
        break;
      }
    }
    if (!found) pos++;
  }
  return tokens;
}

function expandDFS(input, maxResults = 200) {
  const results = [];
  function dfs(pos, current) {
    if (results.length >= maxResults) return;
    if (pos >= input.length) { results.push(current.join("")); return; }
    const matches = getMatchesAt(input, pos);
    for (const match of matches) {
      for (const ar of match.arabic) {
        if (ar === "\u2205") { dfs(pos + match.len, current); }
        else { for (const ch of ar) current.push(ch); dfs(pos + match.len, current); for (let i = 0; i < ar.length; i++) current.pop(); }
      }
    }
  }
  dfs(0, []);
  return results;
}

// ══════════════════════════════════════════
// ── Simple Trie Engine ──
// ══════════════════════════════════════════
let simpleTrieNodeCounter = 0;
let simpleNodeMap = {};
let simpleTrieRoot = null;

function createSimpleTrieNode(char, depth) {
  return { char, depth, children: {}, isWord: false, freq: 0, word: '', id: 'tn' + (simpleTrieNodeCounter++), x: 0, y: 0, parent: null };
}

function buildVizTrie(words) {
  simpleTrieNodeCounter = 0;
  simpleNodeMap = {};
  const root = createSimpleTrieNode('', 0);
  root.id = 'troot';
  simpleNodeMap['troot'] = root;
  for (const [word, freq] of words) {
    let node = root;
    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      if (!node.children[ch]) {
        const child = createSimpleTrieNode(ch, i + 1);
        child.parent = node;
        node.children[ch] = child;
        simpleNodeMap[child.id] = child;
      }
      node = node.children[ch];
    }
    node.isWord = true;
    node.freq = freq;
    node.word = word;
  }
  simpleTrieRoot = root;
  return root;
}

function simpleTrieLookup(root, word) {
  const steps = [];
  let node = root;
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    if (node.children[ch]) {
      node = node.children[ch];
      steps.push({ nodeId: node.id, char: ch, prefix: word.slice(0, i + 1), found: true, isWord: node.isWord, wordFreq: node.freq });
    } else {
      steps.push({ nodeId: null, char: ch, prefix: word.slice(0, i + 1), found: false, isWord: false });
      break;
    }
  }
  return { steps, matched: steps.length === word.length && steps.length > 0 && steps[steps.length - 1].found };
}

function layoutSimpleTrie(root) {
  const NODE_W = 48, ROW_H = 56;
  function subtreeWidth(node) {
    const kids = Object.values(node.children);
    if (kids.length === 0) return NODE_W;
    return Math.max(kids.reduce((s, c) => s + subtreeWidth(c), 0), NODE_W);
  }
  function position(node, cx, cy) {
    node.x = cx; node.y = cy;
    const kids = Object.values(node.children);
    const totalW = kids.reduce((s, c) => s + subtreeWidth(c), 0);
    let x = cx - totalW / 2;
    for (const child of kids) {
      const w = subtreeWidth(child);
      position(child, x + w / 2, cy + ROW_H);
      x += w;
    }
  }
  position(root, 0, 24);
  let minX = Infinity, maxX = -Infinity, maxY = 0;
  function bounds(node) {
    minX = Math.min(minX, node.x); maxX = Math.max(maxX, node.x); maxY = Math.max(maxY, node.y);
    for (const c of Object.values(node.children)) bounds(c);
  }
  bounds(root);
  return { minX: minX - 28, maxX: maxX + 28, maxY: maxY + 28, width: maxX - minX + 56, height: maxY + 52 };
}

function simpleTrieToSVG(root, bounds) {
  const pad = 8;
  const vx = bounds.minX - pad, vw = bounds.width + pad * 2, vh = bounds.height + pad;
  let svg = `<svg class="trie-svg" viewBox="${vx} 0 ${vw} ${vh}" preserveAspectRatio="xMidYMid meet">`;
  function drawEdges(node) {
    for (const child of Object.values(node.children)) {
      svg += `<line class="trie-edge" id="edge-${child.id}" x1="${node.x}" y1="${node.y}" x2="${child.x}" y2="${child.y}"/>`;
      drawEdges(child);
    }
  }
  drawEdges(root);
  function drawNodes(node) {
    const cls = node.isWord ? 'word-node' : '';
    svg += `<g class="trie-node-g ${cls}" id="node-${node.id}">`;
    if (node.isWord) svg += `<circle cx="${node.x}" cy="${node.y}" r="20" class="trie-word-ring"/>`;
    svg += `<circle cx="${node.x}" cy="${node.y}" r="16" class="trie-circle"/>`;
    svg += `<text x="${node.x}" y="${node.y}" dy="0.38em" text-anchor="middle" class="trie-text">${node.char || '\u25CF'}</text></g>`;
    for (const child of Object.values(node.children)) drawNodes(child);
  }
  drawNodes(root);
  svg += '</svg>';
  return svg;
}

function selectTrieWords(dictMatches, expansions) {
  const words = new Map();
  for (const m of dictMatches.slice(0, 8)) words.set(m.word, m.freq);
  const prefixes = new Set();
  for (const [w] of words) { if (w.length >= 2) prefixes.add(w.slice(0, 2)); if (w.length >= 1) prefixes.add(w.slice(0, 1)); }
  for (const e of expansions.slice(0, 15)) { if (e.length >= 2) prefixes.add(e.slice(0, 2)); if (e.length >= 1) prefixes.add(e.slice(0, 1)); }
  const cands = [];
  for (const dw in DICTIONARY) {
    if (words.has(dw) || dw.length > 20) continue;
    for (const pfx of prefixes) { if (dw.startsWith(pfx)) { cands.push([dw, DICTIONARY[dw]]); break; } }
    if (cands.length >= 400) break;
  }
  cands.sort((a, b) => b[1] - a[1]);
  for (const [dw, df] of cands) { if (words.size >= 24) break; words.set(dw, df); }
  return words;
}

function selectLookupCandidates(dictMatches, expansions, trieRoot) {
  const candidates = [], seen = new Set();
  for (const m of dictMatches.slice(0, 2)) {
    if (!seen.has(m.word)) { candidates.push({ word: m.word, inDict: true, freq: m.freq }); seen.add(m.word); }
  }
  let bestNM = null, bestD = 0;
  for (const exp of expansions) {
    if (DICTIONARY[exp] || seen.has(exp) || exp.length === 0) continue;
    const { steps } = simpleTrieLookup(trieRoot, exp);
    const d = steps.filter(s => s.found).length;
    if (d > bestD || (d === bestD && exp.length > (bestNM || '').length)) { bestD = d; bestNM = exp; }
    if (d >= 3) break;
  }
  if (bestNM) candidates.push({ word: bestNM, inDict: false, freq: 0 });
  else { for (const exp of expansions) { if (!DICTIONARY[exp] && !seen.has(exp) && exp.length > 0) { candidates.push({ word: exp, inDict: false, freq: 0 }); break; } } }
  return candidates;
}

// Simple trie path highlighting
let simpleActiveWord = null;

function clearSimpleTrieHighlights() {
  document.querySelectorAll('.trie-node-g').forEach(n => n.classList.remove('visiting', 'found', 'dead-end', 'current'));
  document.querySelectorAll('.trie-edge').forEach(e => e.classList.remove('visiting', 'found', 'dead-end'));
}

function showSimpleWordPath(word) {
  clearSimpleTrieHighlights();
  if (!word || !simpleTrieRoot) return;
  const { steps, matched } = simpleTrieLookup(simpleTrieRoot, word);
  const isFound = !!DICTIONARY[word] && matched;
  const okSteps = steps.filter(s => s.found);
  if (okSteps.length === 0) return;
  const rootEl = document.getElementById('node-troot');
  if (rootEl) rootEl.classList.add(isFound ? 'found' : 'visiting');
  okSteps.forEach((step, i) => {
    const n = document.getElementById(`node-${step.nodeId}`);
    const e = document.getElementById(`edge-${step.nodeId}`);
    if (isFound) {
      if (n) n.classList.add('found');
      if (e) e.classList.add('found');
    } else if (i === okSteps.length - 1) {
      if (n) n.classList.add('dead-end');
      if (e) e.classList.add('dead-end');
    } else {
      if (n) n.classList.add('visiting');
      if (e) e.classList.add('visiting');
    }
  });
}

function setSimpleActiveCandidate(word) {
  document.querySelectorAll('.cand-item').forEach(el => el.classList.toggle('cand-hover', el.dataset.word === word));
  document.querySelectorAll('.lk-card').forEach(el => el.classList.toggle('lk-active', el.dataset.word === word));
  showSimpleWordPath(word);
}

function setupSimpleTrieInteraction() {
  const firstCand = document.querySelector('.cand-item[data-word]');
  simpleActiveWord = firstCand?.dataset.word || null;
  setTimeout(() => setSimpleActiveCandidate(simpleActiveWord), 200);
  document.querySelectorAll('.cand-item[data-word]').forEach(el => {
    el.addEventListener('mouseenter', () => setSimpleActiveCandidate(el.dataset.word));
    el.addEventListener('mouseleave', () => setSimpleActiveCandidate(simpleActiveWord));
  });
  document.querySelectorAll('.lk-card[data-word]').forEach(card => {
    card.addEventListener('mouseenter', () => setSimpleActiveCandidate(card.dataset.word));
    card.addEventListener('mouseleave', () => setSimpleActiveCandidate(simpleActiveWord));
  });
}

// ══════════════════════════════════════════
// ── Full Trie Engine ──
// ══════════════════════════════════════════
let fullTrie = null;
let trieNodeCount = 0;
let trieIdCounter = 0;
const trieNodes = {};

function buildFullTrie() {
  trieIdCounter = 0;
  const root = { ch: '', children: {}, isWord: false, freq: 0, wordCount: 0, expanded: true, id: 'r', x: 0, y: 0 };
  trieNodes['r'] = root;

  for (const word in DICTIONARY) {
    let node = root;
    for (const ch of word) {
      if (!node.children[ch]) {
        const id = 'n' + (trieIdCounter++);
        const child = { ch, children: {}, isWord: false, freq: 0, wordCount: 0, expanded: false, id, x: 0, y: 0 };
        node.children[ch] = child;
        trieNodes[id] = child;
      }
      node = node.children[ch];
    }
    node.isWord = true;
    node.freq = DICTIONARY[word];
  }

  function count(n) {
    let c = n.isWord ? 1 : 0;
    for (const ch of Object.values(n.children)) c += count(ch);
    n.wordCount = c;
    return c;
  }
  count(root);

  trieNodeCount = trieIdCounter + 1;
  fullTrie = root;

  for (const child of Object.values(root.children)) {
    child.expanded = false;
  }
}

// Full trie layout
const NODE_W = 52;
const ROW_H = 62;

function visibleWidth(node) {
  if (!node.expanded || Object.keys(node.children).length === 0) return NODE_W;
  const kids = Object.values(node.children);
  return Math.max(kids.reduce((s, c) => s + visibleWidth(c), 0), NODE_W);
}

function layoutVisible(node, cx, cy) {
  node.x = cx; node.y = cy;
  if (!node.expanded) return;
  const kids = Object.values(node.children);
  if (kids.length === 0) return;
  const totalW = kids.reduce((s, c) => s + visibleWidth(c), 0);
  let x = cx - totalW / 2;
  for (const child of kids) {
    const w = visibleWidth(child);
    layoutVisible(child, x + w / 2, cy + ROW_H);
    x += w;
  }
}

function computeBounds(node) {
  let minX = node.x, maxX = node.x, maxY = node.y;
  if (node.expanded) {
    for (const c of Object.values(node.children)) {
      const b = computeBounds(c);
      minX = Math.min(minX, b.minX);
      maxX = Math.max(maxX, b.maxX);
      maxY = Math.max(maxY, b.maxY);
    }
  }
  return { minX, maxX, maxY };
}

function renderTrieSVG(root, highlightPaths) {
  const hp = highlightPaths || new Set();
  let edges = '', nodes = '';

  function drawNode(node, parentExpanded) {
    if (!parentExpanded) return;
    const hasKids = Object.keys(node.children).length > 0;
    const isCollapsed = hasKids && !node.expanded;
    let cls = 'trie-node-g';
    if (isCollapsed) cls += ' collapsed';
    if (hp.has(node.id)) cls += ' on-path';

    if (node.expanded) {
      for (const child of Object.values(node.children)) {
        let eCls = 'trie-edge';
        if (hp.has(child.id)) eCls += ' on-path';
        edges += `<line class="${eCls}" id="e-${child.id}" x1="${node.x}" y1="${node.y}" x2="${child.x}" y2="${child.y}"/>`;
      }
    }

    nodes += `<g class="${cls}" id="g-${node.id}" data-id="${node.id}">`;
    if (node.isWord) nodes += `<circle cx="${node.x}" cy="${node.y}" r="21" class="trie-word-ring"/>`;
    nodes += `<circle cx="${node.x}" cy="${node.y}" r="17" class="trie-circle"/>`;
    const label = node.ch || '\u25CF';
    nodes += `<text x="${node.x}" y="${node.y}" dy="0.38em" text-anchor="middle" class="trie-text">${label}</text>`;

    if (isCollapsed) {
      const badge = node.wordCount >= 1000 ? (node.wordCount / 1000).toFixed(0) + 'k' : node.wordCount.toString();
      nodes += `<text x="${node.x + 14}" y="${node.y - 14}" text-anchor="middle" class="trie-badge">${badge}</text>`;
    }
    nodes += '</g>';

    if (node.expanded) {
      for (const child of Object.values(node.children)) drawNode(child, true);
    }
  }

  drawNode(root, true);
  return edges + nodes;
}

// Zoom & Pan State
let vb = { x: 0, y: 0, w: 800, h: 600 };
let isPanning = false;
let panStart = { x: 0, y: 0, vbx: 0, vby: 0 };

function resetView() {
  if (!fullTrie) return;
  layoutVisible(fullTrie, 0, 30);
  const b = computeBounds(fullTrie);
  const pad = 40;
  vb.x = b.minX - pad;
  vb.y = 0;
  vb.w = (b.maxX - b.minX) + pad * 2;
  vb.h = b.maxY + pad + 30;
  renderFullTrie();
}

function zoomBy(factor, cx, cy) {
  if (cx === undefined) { cx = vb.x + vb.w / 2; cy = vb.y + vb.h / 2; }
  const nx = cx - (cx - vb.x) * factor;
  const ny = cy - (cy - vb.y) * factor;
  vb.x = nx; vb.y = ny; vb.w *= factor; vb.h *= factor;
}

function expandPath(word) {
  if (!fullTrie) return new Set();
  const ids = new Set(['r']);
  let node = fullTrie;
  for (const ch of word) {
    if (!node.children[ch]) break;
    node = node.children[ch];
    node.expanded = true;
    ids.add(node.id);
  }
  return ids;
}

function collapseAll() {
  function collapse(n) {
    n.expanded = false;
    for (const c of Object.values(n.children)) collapse(c);
  }
  if (!fullTrie) return;
  for (const c of Object.values(fullTrie.children)) collapse(c);
  fullTrie.expanded = true;
  resetView();
}

let highlightIds = new Set();

// AbortController to cleanly remove area-level listeners between renders
let trieAbort = null;

function renderFullTrie(skipLayout) {
  const svgArea = document.getElementById('trie-svg-area');
  if (!svgArea || !fullTrie) return;

  if (!skipLayout) {
    layoutVisible(fullTrie, 0, 30);
    const b = computeBounds(fullTrie);
    if (vb.w <= 1) {
      const pad = 40;
      vb.x = b.minX - pad;
      vb.y = 0;
      vb.w = (b.maxX - b.minX) + pad * 2;
      vb.h = b.maxY + pad + 30;
    }
  }

  const content = renderTrieSVG(fullTrie, highlightIds);
  const svg = `<svg viewBox="${vb.x} ${vb.y} ${vb.w} ${vb.h}" preserveAspectRatio="xMidYMid meet">${content}</svg>`;
  svgArea.innerHTML = svg;

  const statsEl = document.getElementById('trie-stats');
  if (statsEl) {
    const totalWords = fullTrie.wordCount;
    statsEl.textContent = `${totalWords.toLocaleString()} words \u00B7 ${trieNodeCount.toLocaleString()} nodes`;
  }

  // Abort previous listeners before attaching new ones
  if (trieAbort) trieAbort.abort();
  trieAbort = new AbortController();
  const sig = { signal: trieAbort.signal };

  const area = svgArea;
  const svgEl = area.querySelector('svg');
  if (!svgEl) return;

  // Click to expand/collapse (on SVG, replaced each render — no stacking)
  svgEl.addEventListener('click', (e) => {
    const g = e.target.closest('.trie-node-g');
    if (!g) return;
    const id = g.dataset.id;
    const node = trieNodes[id];
    if (!node || Object.keys(node.children).length === 0) return;
    node.expanded = !node.expanded;
    layoutVisible(fullTrie, 0, 30);
    renderFullTrie(true);
  });

  // Tooltip
  const tooltip = document.getElementById('trie-tooltip');
  svgEl.addEventListener('mouseover', (e) => {
    const g = e.target.closest('.trie-node-g');
    if (!g || !tooltip) return;
    const node = trieNodes[g.dataset.id];
    if (!node) return;
    const hasKids = Object.keys(node.children).length;
    let info = `${node.wordCount} word${node.wordCount !== 1 ? 's' : ''} in subtree`;
    if (node.isWord) info += ` \u00B7 freq: ${node.freq}`;
    if (hasKids) info += ` \u00B7 ${hasKids} children`;
    info += node.expanded ? ' \u00B7 click to collapse' : (hasKids ? ' \u00B7 click to expand' : '');
    tooltip.querySelector('.tt-char').textContent = node.ch || 'root';
    tooltip.querySelector('.tt-info').textContent = info;
    tooltip.classList.add('show');
    const rect = area.getBoundingClientRect();
    const svgRect = svgEl.getBoundingClientRect();
    const sx = (node.x - vb.x) / vb.w * svgRect.width;
    const sy = (node.y - vb.y) / vb.h * svgRect.height;
    tooltip.style.left = Math.min(sx + 20, rect.width - 160) + 'px';
    tooltip.style.top = Math.max(sy - 10, 0) + 'px';
  });

  svgEl.addEventListener('mouseout', (e) => {
    if (!e.target.closest('.trie-node-g') && tooltip) tooltip.classList.remove('show');
  });

  // Zoom — on area, abortable to prevent stacking
  area.addEventListener('wheel', (e) => {
    e.preventDefault();
    const s = area.querySelector('svg');
    if (!s) return;
    const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    const rect = s.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const px = vb.x + mx * vb.w;
    const py = vb.y + my * vb.h;
    zoomBy(factor, px, py);
    s.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  }, { passive: false, ...sig });

  // Pan — mousedown on area, mousemove/mouseup on window, all abortable
  area.addEventListener('mousedown', (e) => {
    if (e.target.closest('.trie-node-g')) return;
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, vbx: vb.x, vby: vb.y };
    area.classList.add('panning');
  }, sig);

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const r = area.querySelector('svg')?.getBoundingClientRect();
    if (!r) return;
    const dx = (e.clientX - panStart.x) / r.width * vb.w;
    const dy = (e.clientY - panStart.y) / r.height * vb.h;
    vb.x = panStart.vbx - dx;
    vb.y = panStart.vby - dy;
    const s = area.querySelector('svg');
    if (s) s.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  }, sig);

  window.addEventListener('mouseup', () => {
    isPanning = false;
    area.classList.remove('panning');
  }, sig);
}

// ── Load dictionary & build trie ──
// ══════════════════════════════════════════
(async function() {
  const dashEl = document.getElementById("dash");
  dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u23F3</div><p>Loading dictionary...</p></div>';
  try {
    const resp = await fetch("dictionary.json");
    DICTIONARY = await resp.json();
    dictLoaded = true;
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u23F3</div><p>Building trie...</p></div>';

    await new Promise(r => setTimeout(r, 10));
    buildFullTrie();

    const n = Object.keys(DICTIONARY).length.toLocaleString();
    dashEl.innerHTML = `<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p><p class="sub">${n} words loaded \u00B7 ${trieNodeCount.toLocaleString()} trie nodes</p></div>`;
    document.getElementById("input").focus();
  } catch (e) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u26A0\uFE0F</div><p>Could not load dictionary. Try refreshing.</p></div>';
  }
})();

// ── Mode toggle ──
// ══════════════════════════════════════════
function switchTrieMode(mode) {
  trieMode = mode;
  // Re-render with current input
  const input = document.getElementById("input").value;
  if (input.trim()) render(input);
}

// ══════════════════════════════════════════
// ── Rendering ──
// ══════════════════════════════════════════
const inputEl = document.getElementById("input");
const dashEl = document.getElementById("dash");
const pipeEl = document.getElementById("pipe");
let debounceTimer;

// Cache last computed data for mode switching
let lastUniqueMatches = [];
let lastExpansions = [];
let lastSkeletal = [];
let lastTokens = [];
let lastBranchCount = 1;

inputEl.addEventListener("input", () => {
  if (!dictLoaded) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(inputEl.value), 120);
});

function render(raw) {
  const input = raw.trim().toLowerCase();
  if (!input) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p></div>';
    pipeEl.innerHTML = '';
    highlightIds = new Set();
    return;
  }

  const tokens = tokenize(input);
  if (tokens.length === 0) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u2753</div><p>No recognized Arabizi characters</p></div>';
    pipeEl.innerHTML = '';
    return;
  }

  const expansions = expandDFS(input, 200);
  const dictMatches = expansions.filter(e => DICTIONARY[e]).map(e => ({ word: e, freq: DICTIONARY[e] })).sort((a, b) => b.freq - a.freq);
  const seen = new Set();
  const uniqueMatches = [];
  for (const m of dictMatches) { if (!seen.has(m.word)) { seen.add(m.word); uniqueMatches.push(m); } }
  const skeletal = [];
  const seenSkel = new Set(uniqueMatches.map(m => m.word));
  for (const e of expansions) { if (!seenSkel.has(e) && e.length > 0) { seenSkel.add(e); skeletal.push(e); if (skeletal.length >= 5) break; } }

  let branchCount = 1;
  for (const t of tokens) branchCount *= t.arabic.length;

  // Cache for mode switching
  lastTokens = tokens;
  lastExpansions = expansions;
  lastUniqueMatches = uniqueMatches;
  lastSkeletal = skeletal;
  lastBranchCount = branchCount;

  // Pipeline summary
  pipeEl.innerHTML = `<span class="pv">${input}</span><span class="pa">\u2192</span><span class="pv">${tokens.length}</span><span class="pa">tokens \u2192</span><span class="pv">${expansions.length}</span><span class="pa">forms \u2192</span><span class="pv">${uniqueMatches.length}</span><span class="pa">matches \u2192 ranked</span>`;

  // Build dashboard based on mode
  if (trieMode === 'full') {
    // Auto-expand trie paths for top matches
    highlightIds = new Set(['r']);
    for (const m of uniqueMatches.slice(0, 3)) {
      const ids = expandPath(m.word);
      for (const id of ids) highlightIds.add(id);
    }
    vb = { x: 0, y: 0, w: 0, h: 0 };

    dashEl.innerHTML = `<div class="dash-grid">
      <div class="panel panel-mappings" data-p="0">${buildMappings(tokens, branchCount, expansions.length)}</div>
      <div class="panel panel-trie" data-p="1">${buildFullTriePanel()}</div>
      <div class="panel panel-results" data-p="2">${buildResults(uniqueMatches, skeletal, expansions.length)}</div>
    </div>`;

    renderFullTrie();
    animateDashboard('full');
  } else {
    const trieWords = selectTrieWords(uniqueMatches, expansions);
    const trieRoot = buildVizTrie(trieWords);
    const lookupCands = selectLookupCandidates(uniqueMatches, expansions, trieRoot);

    dashEl.innerHTML = `<div class="dash-grid">
      <div class="panel panel-mappings" data-p="0">${buildMappings(tokens, branchCount, expansions.length)}</div>
      <div class="panel panel-trie" data-p="1">${buildSimpleTriePanel(trieRoot, lookupCands, trieWords.size)}</div>
      <div class="panel panel-results" data-p="2">${buildResults(uniqueMatches, skeletal, expansions.length)}</div>
    </div>`;

    animateDashboard('simple');
  }
}

function buildMappings(tokens, branchCount, actualCount) {
  let cards = "";
  tokens.forEach((t, i) => {
    const opts = t.arabic.map(ar => {
      if (ar === "\u2205") return '<span class="ar-opt skip">skip</span>';
      return `<span class="ar-opt">${ar}</span>`;
    }).join(" ");
    cards += `<div class="m-card" data-delay="${i * 40}"><div class="lat">${t.latin}</div><div class="ar-opts">${opts}</div><div class="cnt">${t.arabic.length}</div></div>`;
  });

  const eq = tokens.map(t => `<span class="bv">${t.arabic.length}</span>`).join('<span class="bm">\u00D7</span>');
  const info = actualCount < branchCount ? `${actualCount} explored` : 'all explored';

  return `<div class="panel-label"><span class="num">1</span>Character mappings</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="mapping-cards">${cards}</div>
      <div class="branch-eq">${eq}<span class="bm">=</span><span class="bt">${branchCount.toLocaleString()}</span><span class="bi">(${info})</span></div>
    </div>`;
}

function buildModeToggle() {
  return `<div class="mode-toggle">
    <button onclick="switchTrieMode('simple')" class="${trieMode === 'simple' ? 'active' : ''}">Simple</button>
    <button onclick="switchTrieMode('full')" class="${trieMode === 'full' ? 'active' : ''}">Full</button>
  </div>`;
}

function buildSimpleTriePanel(trieRoot, lookupCands, trieWordCount) {
  const bounds = layoutSimpleTrie(trieRoot);
  const svg = simpleTrieToSVG(trieRoot, bounds);

  let cards = "";
  lookupCands.forEach((cand, ci) => {
    const { steps, matched } = simpleTrieLookup(trieRoot, cand.word);
    const isFound = cand.inDict && matched;
    const cls = isFound ? 'lk-found' : 'lk-miss';
    let trace = "";
    steps.forEach((step, si) => {
      const sc = step.found ? 'ok' : 'fail';
      const arrow = step.found ? '\u2190' : '\u2190\u2717';
      let badge = '';
      if (step.found && step.isWord) badge = `<span class="wb">\u2605${step.wordFreq}</span>`;
      trace += `<div class="tr-step ${sc} visible">${step.char} ${arrow} ${step.prefix} ${badge}</div>`;
    });
    const rCls = isFound ? 'lk-ok' : 'lk-no';
    const rTxt = isFound ? `\u2705 ${cand.freq}` : '\u274C';
    cards += `<div class="lk-card ${cls}" data-word="${cand.word}" data-found="${isFound}"><div class="lk-word">${cand.word}</div><div class="lk-trace">${trace}</div><div class="lk-result ${rCls} visible">${rTxt}</div></div>`;
  });

  return `<div class="trie-top">
      <div class="panel-label"><span class="num">2</span>Trie lookup <span style="font-weight:400;text-transform:none">(${trieWordCount} nearby words)</span></div>
      <div class="trie-controls">
        ${buildModeToggle()}
        <div class="trie-legend">
          <span class="trie-legend-item"><span class="lg-circle lg-default"></span>node</span>
          <span class="trie-legend-item"><span class="lg-circle lg-word"></span>word</span>
          <span class="trie-legend-item"><span class="lg-circle lg-found"></span>found</span>
          <span class="trie-legend-item"><span class="lg-circle lg-dead"></span>dead end</span>
        </div>
      </div>
    </div>
    <div class="trie-svg-area">${svg}</div>
    <div class="trie-bottom">${cards}</div>`;
}

function buildFullTriePanel() {
  return `<div class="trie-top">
      <div class="panel-label"><span class="num">2</span>Full dictionary trie</div>
      <div class="trie-controls">
        ${buildModeToggle()}
        <span id="trie-stats" class="trie-stats"></span>
        <button onclick="zoomBy(1/1.3);renderFullTrie(true)" title="Zoom in">+</button>
        <button onclick="zoomBy(1.3);renderFullTrie(true)" title="Zoom out">\u2212</button>
        <button onclick="resetView()" title="Fit to view">\u2302</button>
        <button onclick="collapseAll()" title="Collapse all">\u25B2</button>
      </div>
    </div>
    <div class="trie-svg-area pannable" id="trie-svg-area"></div>
    <div class="trie-tooltip" id="trie-tooltip">
      <div class="tt-char"></div>
      <div class="tt-info"></div>
    </div>`;
}

function buildResults(matches, skeletal, totalExpansions) {
  const all = [
    ...matches.map(m => ({ word: m.word, freq: m.freq, type: "dict" })),
    ...skeletal.map(s => ({ word: s, freq: 0, type: "fallback" }))
  ];
  if (!all.length) return '<div style="display:flex;align-items:center;justify-content:center;flex:1;color:#475569;font-size:0.8rem">Type more characters</div>';

  const winner = all[0];

  let cands = "";
  all.slice(0, 7).forEach((item, i) => {
    const rank = i === 0 ? '<span class="cr star">\u2605</span>' : `<span class="cr">${i}.</span>`;
    const fl = item.freq ? item.freq : "fallback";
    cands += `<div class="cand-item${i===0?' cand-top':''}" data-delay="${i*50}" data-word="${item.word}">${rank}<span class="cw">${item.word}</span><span class="cf">${fl}</span></div>`;
    if (i === 0 && all.length > 1) cands += `<div class="cand-sep" data-delay="${(i+1)*50}"></div>`;
  });

  let freqs = "";
  matches.slice(0, 5).forEach((m, i) => {
    const pct = (m.freq / 8000 * 100).toFixed(0);
    freqs += `<div class="freq-row fr-match" data-delay="${i*60}"><span class="fa">${m.word}</span><div class="fb-wrap"><div class="fb" data-width="${pct}%"></div></div><span class="fl">${m.freq}</span></div>`;
  });
  skeletal.slice(0, 2).forEach((s, i) => {
    freqs += `<div class="freq-row fr-fall" data-delay="${(matches.length+i)*60}"><span class="fa">${s}</span><div class="fb-wrap"><div class="fb" data-width="0%"></div></div><span class="fl">fallback</span></div>`;
  });

  return `<div class="result-hero">
      <div class="result-arabic" data-delay="100">${winner.word}</div>
      <div class="result-sub">Press Space to insert</div>
    </div>
    <div class="result-divider"></div>
    <div class="panel-label"><span class="num">3</span>Candidates</div>
    <div class="cand-list">${cands}</div>
    <div class="result-divider"></div>
    <div class="freq-header">${matches.length}/${totalExpansions} forms in dictionary</div>
    <div class="freq-section">${freqs}</div>`;
}

// ── Animation ──
function animateDashboard(mode) {
  document.querySelectorAll(".panel").forEach((el, i) => {
    setTimeout(() => el.classList.add("visible"), i * 60);
  });

  const anim = ".m-card, .cand-item, .cand-sep, .result-arabic, .freq-row";
  document.querySelectorAll(anim).forEach(el => {
    const d = parseInt(el.dataset.delay || 0);
    setTimeout(() => {
      el.classList.add("visible");
      const bar = el.querySelector?.(".fb");
      if (bar) setTimeout(() => { bar.style.width = bar.dataset.width; }, 80);
    }, d + 150);
  });

  if (mode === 'full') {
    // Full mode: candidate hover -> highlight trie path
    document.querySelectorAll('.cand-item[data-word]').forEach(el => {
      el.addEventListener('mouseenter', () => {
        highlightIds = expandPath(el.dataset.word);
        highlightIds.add('r');
        renderFullTrie(true);
      });
      el.addEventListener('mouseleave', () => {
        highlightIds = new Set();
        renderFullTrie(true);
      });
    });
  } else {
    // Simple mode: path highlighting on hover
    setupSimpleTrieInteraction();
  }
}
</script>
