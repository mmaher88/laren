<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laren — Interactive Transliteration Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 8px 14px;
  gap: 5px;
  min-width: 900px;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  padding: 2px 0;
}

.top-bar h1 {
  font-size: 1.25rem;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.top-bar input {
  flex: 1;
  max-width: 360px;
  font-size: 1.1rem;
  padding: 5px 14px;
  border-radius: 8px;
  border: 2px solid #334155;
  background: #1e293b;
  color: #f1f5f9;
  outline: none;
  transition: border-color 0.3s;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.12em;
}

.top-bar input:focus { border-color: #818cf8; }
.top-bar input::placeholder { color: #475569; letter-spacing: 0.05em; font-size: 0.9rem; }

.top-bar .pipe-summary {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: #64748b;
  flex-shrink: 0;
}

.top-bar .pipe-summary .pv { color: #94a3b8; font-weight: 600; }
.top-bar .pipe-summary .pa { color: #475569; }

.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 2px 0;
  font-size: 0.72rem;
}

.footer a { color: #818cf8; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer code { color: #94a3b8; }

/* ── Dashboard ── */
.dash {
  flex: 1;
  min-height: 0;
  display: flex;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: #475569;
  gap: 8px;
}

.empty-state .icon { font-size: 2.5rem; }
.empty-state .sub { font-size: 0.75rem; color: #334155; }

.dash-grid {
  display: grid;
  flex: 1;
  min-height: 0;
  grid-template-rows: auto 1fr;
  grid-template-columns: 1fr 240px;
  grid-template-areas:
    "mappings mappings"
    "trie     results";
  gap: 5px;
}

/* ── Panels ── */
.panel {
  background: #1e293b;
  border-radius: 8px;
  border: 1px solid #334155;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}

.panel.visible { opacity: 1; }

.panel-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.panel-label .num {
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  color: #0f172a;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  font-weight: 800;
}

/* ── Mappings Panel ── */
.panel-mappings {
  grid-area: mappings;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  flex-wrap: wrap;
}

.mapping-cards {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.m-card {
  background: #0f172a;
  border-radius: 6px;
  padding: 3px 6px;
  text-align: center;
  border: 1px solid #334155;
  min-width: 44px;
  opacity: 0;
  transform: scale(0.85);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.m-card.visible { opacity: 1; transform: scale(1); }

.m-card .lat {
  font-size: 0.85rem;
  font-weight: 700;
  color: #38bdf8;
  font-family: 'Courier New', monospace;
  line-height: 1.1;
}

.m-card .ar-opts {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  margin-top: 1px;
}

.m-card .ar-opt {
  font-size: 0.7rem;
  color: #94a3b8;
  direction: rtl;
}

.m-card .ar-opt.skip {
  color: #22c55e;
  font-size: 0.55rem;
  font-style: italic;
  direction: ltr;
}

.m-card .cnt { font-size: 0.5rem; color: #475569; margin-top: 1px; }

.branch-eq {
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
  color: #64748b;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
}

.branch-eq .bv { color: #38bdf8; }
.branch-eq .bm { color: #818cf8; }
.branch-eq .bt { color: #22c55e; font-weight: 700; font-size: 0.85rem; }
.branch-eq .bi { font-size: 0.6rem; color: #475569; margin-left: 4px; }

/* ── Trie Panel ── */
.panel-trie {
  grid-area: trie;
  display: flex;
  flex-direction: column;
  padding: 6px 8px;
  min-height: 0;
}

.trie-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
}

.trie-legend {
  display: flex;
  gap: 8px;
  font-size: 0.6rem;
  color: #64748b;
}

.trie-legend-item { display: flex; align-items: center; gap: 3px; }

.lg-circle {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid;
}

.lg-circle.lg-default { background: #1e293b; border-color: #475569; }
.lg-circle.lg-word { background: #1e293b; border-color: #475569; outline: 1.5px solid #854d0e; outline-offset: 1px; }
.lg-circle.lg-found { background: #052e16; border-color: #22c55e; }
.lg-circle.lg-dead { background: #450a0a; border-color: #ef4444; }

.trie-svg-area {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  border-radius: 6px;
  border: 1px solid #1e293b;
  position: relative;
}

.trie-svg {
  max-width: 100%;
  max-height: 100%;
}

.trie-circle { fill: #1e293b; stroke: #475569; stroke-width: 2; transition: fill 0.4s, stroke 0.4s; }
.trie-word-ring { fill: none; stroke: #854d0e; stroke-width: 2; opacity: 0.5; transition: stroke 0.4s, opacity 0.4s; }
.trie-text { fill: #94a3b8; font-size: 13px; font-family: 'Segoe UI', system-ui, sans-serif; transition: fill 0.4s; pointer-events: none; }
.trie-edge { stroke: #334155; stroke-width: 1.5; transition: stroke 0.4s, stroke-width 0.3s; }

.trie-node-g.visiting .trie-circle { fill: #1e1b4b; stroke: #818cf8; stroke-width: 2.5; }
.trie-node-g.visiting .trie-text { fill: #c7d2fe; }
.trie-node-g.visiting .trie-word-ring { stroke: #818cf8; opacity: 0.8; }
.trie-node-g.found .trie-circle { fill: #052e16; stroke: #22c55e; stroke-width: 2.5; }
.trie-node-g.found .trie-text { fill: #bbf7d0; }
.trie-node-g.found .trie-word-ring { stroke: #22c55e; opacity: 0.9; }
.trie-node-g.dead-end .trie-circle { fill: #450a0a; stroke: #ef4444; stroke-width: 2.5; }
.trie-node-g.dead-end .trie-text { fill: #fecaca; }
.trie-edge.visiting { stroke: #818cf8; stroke-width: 2.5; }
.trie-edge.found { stroke: #22c55e; stroke-width: 2.5; }
.trie-edge.dead-end { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 5 3; }

@keyframes trie-pulse {
  0%, 100% { filter: drop-shadow(0 0 3px rgba(129, 140, 248, 0.4)); }
  50% { filter: drop-shadow(0 0 10px rgba(129, 140, 248, 0.8)); }
}
.trie-node-g.current { animation: trie-pulse 0.8s ease-in-out infinite; }

.trie-bottom {
  display: flex;
  gap: 5px;
  margin-top: 4px;
  flex-shrink: 0;
  max-height: 110px;
  overflow: hidden;
}

.lk-card {
  flex: 1;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 4px 6px;
  min-width: 0;
  cursor: pointer;
  transition: border-color 0.2s;
}

.lk-card.lk-active { border-color: #818cf8; }
.lk-card.lk-found { border-color: #166534; }
.lk-card.lk-miss { border-color: #7f1d1d; }

.lk-word { font-size: 0.9rem; direction: rtl; text-align: center; font-weight: 600; margin-bottom: 2px; }

.lk-trace { display: flex; flex-direction: column; gap: 1px; }

.tr-step {
  font-size: 0.58rem;
  font-family: 'Courier New', monospace;
  color: #64748b;
  direction: rtl;
  opacity: 0;
  transition: opacity 0.25s;
  display: flex;
  align-items: center;
  gap: 3px;
  line-height: 1.3;
}

.tr-step.visible { opacity: 1; }
.tr-step.ok { color: #86efac; }
.tr-step.fail { color: #fca5a5; }

.tr-step .wb {
  background: #422006;
  color: #fbbf24;
  font-size: 0.5rem;
  padding: 0 3px;
  border-radius: 2px;
  direction: ltr;
  white-space: nowrap;
}

.lk-result {
  text-align: center;
  font-weight: 700;
  font-size: 0.6rem;
  padding: 2px 4px;
  border-radius: 4px;
  margin-top: 2px;
  opacity: 0;
  transition: opacity 0.3s;
}

.lk-result.visible { opacity: 1; }
.lk-result.lk-ok { color: #22c55e; background: #052e16; }
.lk-result.lk-no { color: #ef4444; background: #450a0a; }

/* ── Results Panel ── */
.panel-results {
  grid-area: results;
  display: flex;
  flex-direction: column;
  padding: 8px;
  min-height: 0;
  gap: 6px;
}

.result-hero {
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
}

.result-arabic {
  font-size: 2.2rem;
  direction: rtl;
  background: linear-gradient(135deg, #22c55e, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  line-height: 1.2;
}

.result-arabic.visible { opacity: 1; transform: scale(1); }

.result-sub { color: #475569; font-size: 0.6rem; margin-top: 2px; }

.result-divider { border-top: 1px solid #334155; flex-shrink: 0; }

.cand-list {
  flex-shrink: 0;
}

.cand-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 6px;
  border-radius: 5px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.25s;
  font-size: 0.8rem;
  cursor: pointer;
}

.cand-item.cand-hover { background: #1e293b; }

.cand-item.visible { opacity: 1; transform: translateY(0); }
.cand-item.cand-top { background: #1a2e05; border: 1px solid #365314; }

.cand-item .cr { color: #475569; font-size: 0.65rem; min-width: 16px; }
.cand-item .cr.star { color: #eab308; }
.cand-item .cw { font-size: 0.95rem; direction: rtl; flex: 1; }
.cand-item .cf { font-size: 0.55rem; color: #475569; }

.cand-sep { border-top: 1px dashed #334155; margin: 2px 0; opacity: 0; transition: opacity 0.3s; }
.cand-sep.visible { opacity: 1; }

.freq-section {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.freq-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 4px;
  border-radius: 5px;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s;
  flex-shrink: 0;
}

.freq-row.visible { opacity: 1; transform: translateX(0); }
.freq-row.fr-match { background: #052e16; border: 1px solid #166534; }
.freq-row.fr-fall { opacity: 0.5; }

.freq-row .fa { font-size: 0.9rem; direction: rtl; min-width: 60px; text-align: center; }
.freq-row .fb-wrap { flex: 1; height: 5px; background: #0f172a; border-radius: 3px; overflow: hidden; }
.freq-row .fb { height: 100%; border-radius: 3px; transition: width 0.8s ease-out; width: 0; }
.freq-row.fr-match .fb { background: linear-gradient(90deg, #22c55e, #38bdf8); }
.freq-row .fl { font-size: 0.55rem; color: #64748b; min-width: 50px; text-align: right; }

.freq-header {
  font-size: 0.55rem;
  color: #475569;
  text-align: center;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>Laren</h1>
    <input type="text" id="input" placeholder="Type Arabizi... e.g. 7abibi" autocomplete="off" spellcheck="false">
    <div class="pipe-summary" id="pipe"></div>
  </div>

  <div id="dash" class="dash">
    <div class="empty-state">
      <div class="icon">&#x2328;&#xFE0F;</div>
      <p>Start typing to see the transliteration pipeline</p>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/mmaher88/laren">github.com/mmaher88/laren</a> &mdash; Install with <code>yay -S fcitx5-laren</code>
  </div>
</div>

<script>
// ── Arabizi mapping rules (mirrors rule_engine.cpp) ──
const MAPPINGS = {
  // Prime variants (3-char tokens)
  "3'": ["\u063A"], "7'": ["\u062E"], "6'": ["\u0638"], "9'": ["\u0636"],
  "d'": ["\u0630"], "t'": ["\u062B"], "s'": ["\u0634"],
  // Digraphs
  "sh": ["\u0634"], "kh": ["\u062E"], "gh": ["\u063A"],
  "th": ["\u062B", "\u0630"], "dh": ["\u0630", "\u0636"],
  "aa": ["\u0627", "\u0622"], "ee": ["\u064A"], "oo": ["\u0648"], "ou": ["\u0648"],
  "3h": ["\u063A"],
  // Doubled consonants
  "bb": ["\u0628"], "tt": ["\u062A","\u0637"], "dd": ["\u062F","\u0636"], "rr": ["\u0631"],
  "ss": ["\u0633","\u0635","\u062B"], "ff": ["\u0641"], "kk": ["\u0643"], "ll": ["\u0644"],
  "mm": ["\u0645"], "nn": ["\u0646"], "yy": ["\u064A"], "ww": ["\u0648"],
  "zz": ["\u0632"], "gg": ["\u062C"], "hh": ["\u0647"],
  // Numbers — 2 now includes waw-hamza (ؤ) and ya-hamza (ئ)
  "2": ["\u0621","\u0623","\u0625","\u0624","\u0626","\u0642"],
  "3": ["\u0639"], "5": ["\u062E"],
  "6": ["\u0637"], "7": ["\u062D"], "8": ["\u0642"], "9": ["\u0635"],
  // Single letters
  "a": ["\u2205","\u0627","\u0623","\u0649","\u0647","\u0629"],
  "b": ["\u0628"], "t": ["\u062A","\u0637"],
  "g": ["\u062C"], "j": ["\u062C"], "d": ["\u062F","\u0636"], "r": ["\u0631"],
  "z": ["\u0632","\u0638","\u0630"], "s": ["\u0633","\u0635","\u062B"], "f": ["\u0641"],
  "q": ["\u0642"], "k": ["\u0642","\u0643"], "l": ["\u0644"], "m": ["\u0645"],
  "n": ["\u0646"], "h": ["\u0647","\u062D"], "w": ["\u0648"], "y": ["\u064A"],
  "i": ["\u2205","\u064A","\u0627","\u0623","\u0625"],
  "u": ["\u2205","\u0648","\u0623"], "o": ["\u2205","\u0648","\u0623"],
  // e: includes multi-char إي (alef-hamza-below + ya)
  "e": ["\u2205","\u064A","\u0627","\u0623","\u0625","\u0625\u064A"],
  "p": ["\u0628"], "v": ["\u0641"], "x": ["\u062E"], "c": ["\u0643"],
};

const MAPPING_NAMES = {
  "\u0621":"hamza","\u0623":"alef-hamza","\u0625":"alef-hamza-below","\u0622":"alef-madda",
  "\u0624":"waw-hamza","\u0626":"ya-hamza",
  "\u0627":"alef","\u0628":"ba","\u062A":"ta","\u062B":"tha","\u062C":"jeem","\u062D":"haa",
  "\u062E":"kha","\u062F":"dal","\u0630":"dhal","\u0631":"ra","\u0632":"zayn","\u0633":"seen",
  "\u0634":"sheen","\u0635":"sad","\u0636":"dad","\u0637":"taa","\u0638":"dhaa","\u0639":"ain",
  "\u063A":"ghain","\u0641":"fa","\u0642":"qaf","\u0643":"kaf","\u0644":"lam","\u0645":"meem",
  "\u0646":"noon","\u0647":"ha","\u0648":"waw","\u064A":"ya","\u0629":"ta-marbuta",
  "\u0649":"alef-maqsura","\u0625\u064A":"alef-hamza-below+ya","\u2205":"skip"
};

// ── Dictionary ──
let DICTIONARY = {};
let dictLoaded = false;

// ── Tokenize & DFS ──
function getMatchesAt(input, pos) {
  const results = [];
  const remaining = input.slice(pos).toLowerCase();
  for (const len of [3, 2, 1]) {
    const substr = remaining.slice(0, len);
    if (MAPPINGS[substr]) results.push({ latin: substr, arabic: MAPPINGS[substr], len });
  }
  return results;
}

function tokenize(input) {
  const tokens = [];
  let pos = 0;
  const lower = input.toLowerCase();
  while (pos < lower.length) {
    let found = false;
    for (const len of [3, 2, 1]) {
      const substr = lower.slice(pos, pos + len);
      if (MAPPINGS[substr]) {
        tokens.push({ latin: substr, arabic: MAPPINGS[substr], pos, len });
        pos += len;
        found = true;
        break;
      }
    }
    if (!found) pos++;
  }
  return tokens;
}

function expandDFS(input, maxResults = 200) {
  const results = [];
  function dfs(pos, current) {
    if (results.length >= maxResults) return;
    if (pos >= input.length) { results.push(current.join("")); return; }
    const matches = getMatchesAt(input, pos);
    for (const match of matches) {
      for (const ar of match.arabic) {
        if (ar === "\u2205") { dfs(pos + match.len, current); }
        else { for (const ch of ar) current.push(ch); dfs(pos + match.len, current); for (let i = 0; i < ar.length; i++) current.pop(); }
      }
    }
  }
  dfs(0, []);
  return results;
}

// ── Trie Visualization Engine ──
let trieNodeCounter = 0;

function createTrieNode(char, depth) {
  return { char, depth, children: {}, isWord: false, freq: 0, word: '', id: 'tn' + (trieNodeCounter++), x: 0, y: 0, parent: null };
}

let currentNodeMap = {};
let currentTrieRoot = null;

function buildVizTrie(words) {
  trieNodeCounter = 0;
  currentNodeMap = {};
  const root = createTrieNode('', 0);
  root.id = 'troot';
  currentNodeMap['troot'] = root;
  for (const [word, freq] of words) {
    let node = root;
    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      if (!node.children[ch]) {
        const child = createTrieNode(ch, i + 1);
        child.parent = node;
        node.children[ch] = child;
        currentNodeMap[child.id] = child;
      }
      node = node.children[ch];
    }
    node.isWord = true;
    node.freq = freq;
    node.word = word;
  }
  currentTrieRoot = root;
  return root;
}

function trieLookup(root, word) {
  const steps = [];
  let node = root;
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    if (node.children[ch]) {
      node = node.children[ch];
      steps.push({ nodeId: node.id, char: ch, prefix: word.slice(0, i + 1), found: true, isWord: node.isWord, wordFreq: node.freq });
    } else {
      steps.push({ nodeId: null, char: ch, prefix: word.slice(0, i + 1), found: false, isWord: false });
      break;
    }
  }
  return { steps, matched: steps.length === word.length && steps.length > 0 && steps[steps.length - 1].found };
}

function layoutTrie(root) {
  const NODE_W = 48;
  const ROW_H = 56;
  function subtreeWidth(node) {
    const kids = Object.values(node.children);
    if (kids.length === 0) return NODE_W;
    return Math.max(kids.reduce((s, c) => s + subtreeWidth(c), 0), NODE_W);
  }
  function position(node, cx, cy) {
    node.x = cx; node.y = cy;
    const kids = Object.values(node.children);
    const totalW = kids.reduce((s, c) => s + subtreeWidth(c), 0);
    let x = cx - totalW / 2;
    for (const child of kids) {
      const w = subtreeWidth(child);
      position(child, x + w / 2, cy + ROW_H);
      x += w;
    }
  }
  position(root, 0, 24);
  let minX = Infinity, maxX = -Infinity, maxY = 0;
  function bounds(node) {
    minX = Math.min(minX, node.x); maxX = Math.max(maxX, node.x); maxY = Math.max(maxY, node.y);
    for (const c of Object.values(node.children)) bounds(c);
  }
  bounds(root);
  return { minX: minX - 28, maxX: maxX + 28, maxY: maxY + 28, width: maxX - minX + 56, height: maxY + 52 };
}

function trieToSVG(root, bounds) {
  const pad = 8;
  const vx = bounds.minX - pad, vw = bounds.width + pad * 2, vh = bounds.height + pad;
  let svg = `<svg class="trie-svg" viewBox="${vx} 0 ${vw} ${vh}" preserveAspectRatio="xMidYMid meet">`;
  function drawEdges(node) {
    for (const child of Object.values(node.children)) {
      svg += `<line class="trie-edge" id="edge-${child.id}" x1="${node.x}" y1="${node.y}" x2="${child.x}" y2="${child.y}"/>`;
      drawEdges(child);
    }
  }
  drawEdges(root);
  function drawNodes(node) {
    const cls = node.isWord ? 'word-node' : '';
    svg += `<g class="trie-node-g ${cls}" id="node-${node.id}">`;
    if (node.isWord) svg += `<circle cx="${node.x}" cy="${node.y}" r="20" class="trie-word-ring"/>`;
    svg += `<circle cx="${node.x}" cy="${node.y}" r="16" class="trie-circle"/>`;
    svg += `<text x="${node.x}" y="${node.y}" dy="0.38em" text-anchor="middle" class="trie-text">${node.char || '\u25CF'}</text></g>`;
    for (const child of Object.values(node.children)) drawNodes(child);
  }
  drawNodes(root);
  svg += `</svg>`;
  return svg;
}

function selectTrieWords(dictMatches, expansions) {
  const words = new Map();
  // Include all shown dict matches (candidate list shows up to 7)
  for (const m of dictMatches.slice(0, 8)) words.set(m.word, m.freq);
  const prefixes = new Set();
  for (const [w] of words) { if (w.length >= 2) prefixes.add(w.slice(0, 2)); if (w.length >= 1) prefixes.add(w.slice(0, 1)); }
  for (const e of expansions.slice(0, 15)) { if (e.length >= 2) prefixes.add(e.slice(0, 2)); if (e.length >= 1) prefixes.add(e.slice(0, 1)); }
  const cands = [];
  for (const dw in DICTIONARY) {
    if (words.has(dw) || dw.length > 20) continue;
    for (const pfx of prefixes) { if (dw.startsWith(pfx)) { cands.push([dw, DICTIONARY[dw]]); break; } }
    if (cands.length >= 400) break;
  }
  cands.sort((a, b) => b[1] - a[1]);
  for (const [dw, df] of cands) { if (words.size >= 24) break; words.set(dw, df); }
  return words;
}

function selectLookupCandidates(dictMatches, expansions, trieRoot) {
  const candidates = [], seen = new Set();
  for (const m of dictMatches.slice(0, 2)) {
    if (!seen.has(m.word)) { candidates.push({ word: m.word, inDict: true, freq: m.freq }); seen.add(m.word); }
  }
  let bestNM = null, bestD = 0;
  for (const exp of expansions) {
    if (DICTIONARY[exp] || seen.has(exp) || exp.length === 0) continue;
    const { steps } = trieLookup(trieRoot, exp);
    const d = steps.filter(s => s.found).length;
    if (d > bestD || (d === bestD && exp.length > (bestNM || '').length)) { bestD = d; bestNM = exp; }
    if (d >= 3) break;
  }
  if (bestNM) candidates.push({ word: bestNM, inDict: false, freq: 0 });
  else { for (const exp of expansions) { if (!DICTIONARY[exp] && !seen.has(exp) && exp.length > 0) { candidates.push({ word: exp, inDict: false, freq: 0 }); break; } } }
  return candidates;
}

// ── Load dictionary ──
(async function() {
  const dashEl = document.getElementById("dash");
  dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u23F3</div><p>Loading dictionary...</p></div>';
  try {
    const resp = await fetch("dictionary.json");
    DICTIONARY = await resp.json();
    dictLoaded = true;
    const n = Object.keys(DICTIONARY).length.toLocaleString();
    dashEl.innerHTML = `<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p><p class="sub">${n} words loaded</p></div>`;
    document.getElementById("input").focus();
  } catch (e) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u26A0\uFE0F</div><p>Could not load dictionary. Try refreshing.</p></div>';
  }
})();

// ── Rendering ──
const inputEl = document.getElementById("input");
const dashEl = document.getElementById("dash");
const pipeEl = document.getElementById("pipe");
let debounceTimer;

inputEl.addEventListener("input", () => {
  if (!dictLoaded) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(inputEl.value), 120);
});

function render(raw) {
  const input = raw.trim().toLowerCase();
  if (!input) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">&#x2328;&#xFE0F;</div><p>Start typing to see the transliteration pipeline</p></div>';
    pipeEl.innerHTML = '';
    return;
  }

  const tokens = tokenize(input);
  if (tokens.length === 0) {
    dashEl.innerHTML = '<div class="empty-state"><div class="icon">\u2753</div><p>No recognized Arabizi characters</p></div>';
    pipeEl.innerHTML = '';
    return;
  }

  const expansions = expandDFS(input, 200);
  const dictMatches = expansions.filter(e => DICTIONARY[e]).map(e => ({ word: e, freq: DICTIONARY[e] })).sort((a, b) => b.freq - a.freq);
  const seen = new Set();
  const uniqueMatches = [];
  for (const m of dictMatches) { if (!seen.has(m.word)) { seen.add(m.word); uniqueMatches.push(m); } }
  const skeletal = [];
  const seenSkel = new Set(uniqueMatches.map(m => m.word));
  for (const e of expansions) { if (!seenSkel.has(e) && e.length > 0) { seenSkel.add(e); skeletal.push(e); if (skeletal.length >= 5) break; } }

  let branchCount = 1;
  for (const t of tokens) branchCount *= t.arabic.length;

  const trieWords = selectTrieWords(uniqueMatches, expansions);
  const trieRoot = buildVizTrie(trieWords);
  const lookupCands = selectLookupCandidates(uniqueMatches, expansions, trieRoot);

  // Pipeline summary in top bar
  pipeEl.innerHTML = `<span class="pv">${input}</span><span class="pa">\u2192</span><span class="pv">${tokens.length}</span><span class="pa">tokens \u2192</span><span class="pv">${expansions.length}</span><span class="pa">forms \u2192</span><span class="pv">${uniqueMatches.length}</span><span class="pa">matches \u2192 ranked</span>`;

  // Build dashboard
  dashEl.innerHTML = `<div class="dash-grid">
    <div class="panel panel-mappings" data-p="0">${buildMappings(tokens, branchCount, expansions.length)}</div>
    <div class="panel panel-trie" data-p="1">${buildTrie(trieRoot, lookupCands, trieWords.size)}</div>
    <div class="panel panel-results" data-p="2">${buildResults(uniqueMatches, skeletal, expansions.length)}</div>
  </div>`;

  animateDashboard();
}

function buildMappings(tokens, branchCount, actualCount) {
  let cards = "";
  tokens.forEach((t, i) => {
    const opts = t.arabic.map(ar => {
      if (ar === "\u2205") return '<span class="ar-opt skip">skip</span>';
      return `<span class="ar-opt">${ar}</span>`;
    }).join(" ");
    cards += `<div class="m-card" data-delay="${i * 40}"><div class="lat">${t.latin}</div><div class="ar-opts">${opts}</div><div class="cnt">${t.arabic.length}</div></div>`;
  });

  const eq = tokens.map(t => `<span class="bv">${t.arabic.length}</span>`).join('<span class="bm">\u00D7</span>');
  const info = actualCount < branchCount ? `${actualCount} explored` : 'all explored';

  return `<div class="panel-label"><span class="num">1</span>Character mappings</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="mapping-cards">${cards}</div>
      <div class="branch-eq">${eq}<span class="bm">=</span><span class="bt">${branchCount.toLocaleString()}</span><span class="bi">(${info})</span></div>
    </div>`;
}

function buildTrie(trieRoot, lookupCands, trieWordCount) {
  const bounds = layoutTrie(trieRoot);
  const svg = trieToSVG(trieRoot, bounds);

  let cards = "";
  lookupCands.forEach((cand, ci) => {
    const { steps, matched } = trieLookup(trieRoot, cand.word);
    const isFound = cand.inDict && matched;
    const cls = isFound ? 'lk-found' : 'lk-miss';
    let trace = "";
    steps.forEach((step, si) => {
      const sc = step.found ? 'ok' : 'fail';
      const arrow = step.found ? '\u2190' : '\u2190\u2717';
      let badge = '';
      if (step.found && step.isWord) badge = `<span class="wb">\u2605${step.wordFreq}</span>`;
      trace += `<div class="tr-step ${sc} visible">${step.char} ${arrow} ${step.prefix} ${badge}</div>`;
    });
    const rCls = isFound ? 'lk-ok' : 'lk-no';
    const rTxt = isFound ? `\u2705 ${cand.freq}` : '\u274C';
    cards += `<div class="lk-card ${cls}" data-word="${cand.word}" data-found="${isFound}"><div class="lk-word">${cand.word}</div><div class="lk-trace">${trace}</div><div class="lk-result ${rCls} visible">${rTxt}</div></div>`;
  });

  return `<div class="trie-top">
      <div class="panel-label"><span class="num">2</span>Trie lookup <span style="font-weight:400;text-transform:none">(${trieWordCount} nearby words)</span></div>
      <div class="trie-legend">
        <span class="trie-legend-item"><span class="lg-circle lg-default"></span>node</span>
        <span class="trie-legend-item"><span class="lg-circle lg-word"></span>word</span>
        <span class="trie-legend-item"><span class="lg-circle lg-found"></span>found</span>
        <span class="trie-legend-item"><span class="lg-circle lg-dead"></span>dead end</span>
      </div>
    </div>
    <div class="trie-svg-area">${svg}</div>
    <div class="trie-bottom">${cards}</div>`;
}

function buildResults(matches, skeletal, totalExpansions) {
  const all = [
    ...matches.map(m => ({ word: m.word, freq: m.freq, type: "dict" })),
    ...skeletal.map(s => ({ word: s, freq: 0, type: "fallback" }))
  ];
  if (!all.length) return '<div style="display:flex;align-items:center;justify-content:center;flex:1;color:#475569;font-size:0.8rem">Type more characters</div>';

  const winner = all[0];

  // Candidates
  let cands = "";
  all.slice(0, 7).forEach((item, i) => {
    const rank = i === 0 ? '<span class="cr star">\u2605</span>' : `<span class="cr">${i}.</span>`;
    const fl = item.freq ? item.freq : "fallback";
    cands += `<div class="cand-item${i===0?' cand-top':''}" data-delay="${i*50}" data-word="${item.word}">${rank}<span class="cw">${item.word}</span><span class="cf">${fl}</span></div>`;
    if (i === 0 && all.length > 1) cands += `<div class="cand-sep" data-delay="${(i+1)*50}"></div>`;
  });

  // Freq bars
  let freqs = "";
  matches.slice(0, 5).forEach((m, i) => {
    const pct = (m.freq / 8000 * 100).toFixed(0);
    freqs += `<div class="freq-row fr-match" data-delay="${i*60}"><span class="fa">${m.word}</span><div class="fb-wrap"><div class="fb" data-width="${pct}%"></div></div><span class="fl">${m.freq}</span></div>`;
  });
  skeletal.slice(0, 2).forEach((s, i) => {
    freqs += `<div class="freq-row fr-fall" data-delay="${(matches.length+i)*60}"><span class="fa">${s}</span><div class="fb-wrap"><div class="fb" data-width="0%"></div></div><span class="fl">fallback</span></div>`;
  });

  return `<div class="result-hero">
      <div class="result-arabic" data-delay="100">${winner.word}</div>
      <div class="result-sub">Press Space to insert</div>
    </div>
    <div class="result-divider"></div>
    <div class="panel-label"><span class="num">3</span>Candidates</div>
    <div class="cand-list">${cands}</div>
    <div class="result-divider"></div>
    <div class="freq-header">${matches.length}/${totalExpansions} forms in dictionary</div>
    <div class="freq-section">${freqs}</div>`;
}

// ── Animation ──
function animateDashboard() {
  document.querySelectorAll(".panel").forEach((el, i) => {
    setTimeout(() => el.classList.add("visible"), i * 60);
  });

  const anim = ".m-card, .cand-item, .cand-sep, .result-arabic, .freq-row";
  document.querySelectorAll(anim).forEach(el => {
    const d = parseInt(el.dataset.delay || 0);
    setTimeout(() => {
      el.classList.add("visible");
      const bar = el.querySelector?.(".fb");
      if (bar) setTimeout(() => { bar.style.width = bar.dataset.width; }, 80);
    }, d + 150);
  });

  setupTrieInteraction();
}

// ── Trie Path Highlighting ──
let activeWord = null;

function clearTrieHighlights() {
  document.querySelectorAll('.trie-node-g').forEach(n => {
    n.classList.remove('visiting', 'found', 'dead-end', 'current');
  });
  document.querySelectorAll('.trie-edge').forEach(e => {
    e.classList.remove('visiting', 'found', 'dead-end');
  });
}

function showWordPath(word) {
  clearTrieHighlights();
  if (!word || !currentTrieRoot) return;

  const { steps, matched } = trieLookup(currentTrieRoot, word);
  const isFound = !!DICTIONARY[word] && matched;
  const okSteps = steps.filter(s => s.found);
  if (okSteps.length === 0) return;

  const rootEl = document.getElementById('node-troot');
  if (rootEl) rootEl.classList.add(isFound ? 'found' : 'visiting');

  okSteps.forEach((step, i) => {
    const n = document.getElementById(`node-${step.nodeId}`);
    const e = document.getElementById(`edge-${step.nodeId}`);
    if (isFound) {
      if (n) n.classList.add('found');
      if (e) e.classList.add('found');
    } else if (i === okSteps.length - 1) {
      if (n) n.classList.add('dead-end');
      if (e) e.classList.add('dead-end');
    } else {
      if (n) n.classList.add('visiting');
      if (e) e.classList.add('visiting');
    }
  });
}

function setActiveCandidate(word) {
  // Update highlights on candidate items and lookup cards
  document.querySelectorAll('.cand-item').forEach(el => {
    el.classList.toggle('cand-hover', el.dataset.word === word);
  });
  document.querySelectorAll('.lk-card').forEach(el => {
    el.classList.toggle('lk-active', el.dataset.word === word);
  });
  showWordPath(word);
}

function setupTrieInteraction() {
  // Default word = first candidate
  const firstCand = document.querySelector('.cand-item[data-word]');
  activeWord = firstCand?.dataset.word || null;

  // Show default path after panels fade in
  setTimeout(() => setActiveCandidate(activeWord), 200);

  // Candidate list hover (right panel)
  document.querySelectorAll('.cand-item[data-word]').forEach(el => {
    el.addEventListener('mouseenter', () => setActiveCandidate(el.dataset.word));
    el.addEventListener('mouseleave', () => setActiveCandidate(activeWord));
  });

  // Bottom lookup card hover
  document.querySelectorAll('.lk-card[data-word]').forEach(card => {
    card.addEventListener('mouseenter', () => setActiveCandidate(card.dataset.word));
    card.addEventListener('mouseleave', () => setActiveCandidate(activeWord));
  });
}
</script>
